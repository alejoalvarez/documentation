<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Complexity Visualizations</title>
    <style>
        :root {
            --bg-dark: #030507;
            --bg-panel: #0a0f16;
            --border-glow: rgba(0, 255, 255, 0.3);
            --text-main: #e0f2fe;
            --text-dim: #7dd3fc;

            --c-on: #00ffff;
            --c-on2: #ff3c00;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: transparent;
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-panel);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.05);
        }

        .title {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            background: rgba(0, 210, 255, 0.1);
            color: var(--text-main);
            border: 1px solid var(--border-glow);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        .btn:hover {
            background: rgba(0, 210, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .algo-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .algo-card {
            flex: 1;
            min-width: 300px;
            background: var(--bg-panel);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .algo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .algo-title {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .algo-card.linear .algo-title {
            color: var(--c-on);
        }

        .algo-card.quad .algo-title {
            color: var(--c-on2);
        }

        .stat-box {
            font-family: monospace;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 10px;
            border-radius: 4px;
        }

        .timer {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .pseudo {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #ccc;
            line-height: 1.4;
            border-left: 3px solid rgba(255, 255, 255, 0.2);
        }

        .line {
            transition: 0.1s;
            padding: 2px 4px;
            border-radius: 2px;
        }

        .line.active {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .viz-window {
            height: 180px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            padding: 10px;
            gap: 4px;
        }

        .item-box {
            width: 30px;
            height: 30px;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-size: 0.9rem;
            transition: 0.1s;
        }

        .item-box.checking {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .linear .item-box.done {
            background: rgba(0, 255, 255, 0.2);
            border-color: var(--c-on);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
            color: var(--c-on);
        }

        .quad .item-box.done {
            background: rgba(255, 60, 0, 0.2);
            border-color: var(--c-on2);
            box-shadow: 0 0 8px rgba(255, 60, 0, 0.3);
            color: var(--c-on2);
        }

        .quad .item-box.checking {
            background: rgba(255, 60, 0, 0.4);
            border-color: #fff;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="title">Visualizing Algorithm Wall-Clock execution</div>
        <div class="controls">
            <span style="font-size:0.9rem; color:var(--text-dim);">Input `n` = 16</span>
            <button class="btn" id="run-btn" onclick="runRace()">Run Simulation</button>
        </div>
    </div>

    <div class="algo-container">
        <!-- O(N) Card -->
        <div class="algo-card linear">
            <div class="algo-header">
                <div>
                    <div class="algo-title">O(n) - Single Loop</div>
                    <div class="timer">Operations: <span id="ops-n">0</span> / 16</div>
                </div>
                <div class="stat-box" id="time-n">0ms</div>
            </div>
            <div class="pseudo" id="code-n">
                <div class="line" id="nl1">for item in array:</div>
                <div class="line" id="nl2">&nbsp;&nbsp;&nbsp;&nbsp;process(item)</div>
            </div>
            <div class="viz-window" id="viz-n">
                <!-- boxes added via JS -->
            </div>
        </div>

        <!-- O(N^2) Card -->
        <div class="algo-card quad">
            <div class="algo-header">
                <div>
                    <div class="algo-title">O(n²) - Nested Loop</div>
                    <div class="timer">Operations: <span id="ops-n2">0</span> / 256</div>
                </div>
                <div class="stat-box" id="time-n2">0ms</div>
            </div>
            <div class="pseudo" id="code-n2">
                <div class="line" id="ql1">for i in array:</div>
                <div class="line" id="ql2">&nbsp;&nbsp;&nbsp;&nbsp;for j in array:</div>
                <div class="line" id="ql3">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;process(i, j)</div>
            </div>
            <div class="viz-window" id="viz-n2" style="align-content: flex-start;">
                <!-- grid added via JS -->
            </div>
        </div>
    </div>

    <script>
        const N = 16;
        const SPEED_MS = 30; // 30ms per instruction

        const runBtn = document.getElementById('run-btn');
        let linearRunning = false;
        let quadRunning = false;

        function init() {
            // Setup N
            const vn = document.getElementById('viz-n');
            vn.innerHTML = '';
            for (let i = 0; i < N; i++) {
                vn.innerHTML += `<div class="item-box" id="nb-${i}">${i}</div>`;
            }

            // Setup N^2 (just using a grid of N*N)
            const vq = document.getElementById('viz-n2');
            vq.innerHTML = '';
            for (let i = 0; i < N; i++) {
                for (let j = 0; j < N; j++) {
                    vq.innerHTML += `<div class="item-box" style="width:16px; height:16px; font-size:6px;" id="qb-${i}-${j}"></div>`;
                }
            }
        }

        async function sleep(ms) {
            return new Promise(res => setTimeout(res, ms));
        }

        async function runLinear() {
            linearRunning = true;
            let ops = 0;
            const opsLabel = document.getElementById('ops-n');
            const timerLabel = document.getElementById('time-n');
            const l1 = document.getElementById('nl1');
            const l2 = document.getElementById('nl2');
            const startTime = performance.now();

            for (let i = 0; i < N; i++) {
                l1.classList.add('active'); l2.classList.remove('active');
                await sleep(SPEED_MS / 2);

                l1.classList.remove('active'); l2.classList.add('active');
                const b = document.getElementById(`nb-${i}`);
                b.classList.add('checking');
                ops++;
                opsLabel.textContent = ops;
                timerLabel.textContent = Math.round(performance.now() - startTime) + 'ms';

                await sleep(SPEED_MS / 2);
                b.classList.remove('checking');
                b.classList.add('done');
            }
            l2.classList.remove('active');
            linearRunning = false;
            checkDone();
        }

        async function runQuad() {
            quadRunning = true;
            let ops = 0;
            const opsLabel = document.getElementById('ops-n2');
            const timerLabel = document.getElementById('time-n2');
            const l1 = document.getElementById('ql1');
            const l2 = document.getElementById('ql2');
            const l3 = document.getElementById('ql3');
            const startTime = performance.now();

            for (let i = 0; i < N; i++) {
                l1.classList.add('active'); l2.classList.remove('active'); l3.classList.remove('active');
                await sleep(SPEED_MS / 4);

                for (let j = 0; j < N; j++) {
                    l1.classList.remove('active'); l2.classList.add('active'); l3.classList.remove('active');
                    await sleep(SPEED_MS / 4);

                    l2.classList.remove('active'); l3.classList.add('active');
                    const b = document.getElementById(`qb-${i}-${j}`);
                    b.classList.add('checking');
                    ops++;
                    opsLabel.textContent = ops;
                    timerLabel.textContent = Math.round(performance.now() - startTime) + 'ms';

                    await sleep(SPEED_MS / 4);
                    b.classList.remove('checking');
                    b.classList.add('done');
                }
            }
            l3.classList.remove('active');
            quadRunning = false;
            checkDone();
        }

        function runRace() {
            init(); // reset visuals
            document.getElementById('ops-n').textContent = '0';
            document.getElementById('ops-n2').textContent = '0';
            document.getElementById('time-n').textContent = '0ms';
            document.getElementById('time-n2').textContent = '0ms';

            runBtn.disabled = true;
            runBtn.textContent = 'Running...';

            runLinear();
            runQuad();
        }

        function checkDone() {
            if (!linearRunning && !quadRunning) {
                runBtn.disabled = false;
                runBtn.textContent = 'Rerun Simulation';
            }
        }

        init();
    </script>
</body>

</html>
