<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Heap Sort Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04050d;
      --panel: #0a0d1a;
      --text: #e9f5ff;
      --neon-cyan: #00e5ff;
      --neon-cyan-soft: rgba(0, 229, 255, 0.2);
      --neon-pink: #ff4fd8;
      --neon-lime: #7dff9b;
      --neon-amber: #ffb347;
      --neon-yellow: #ffe94f;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 50% 20%, #11152b 0%, var(--bg) 45%, #02030a 100%);
      color: var(--text);
      font-family: 'Fira Code', monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: unset;
      padding: 0;
    }

    .container {
      width: calc(100% - 32px);
      max-width: 1200px;
      height: auto;
      background: linear-gradient(180deg, rgba(10, 13, 26, 0.9), rgba(6, 9, 20, 0.95));
      border: 1px solid var(--neon-cyan-soft);
      border-radius: 14px;
      box-shadow: 0 0 28px rgba(0, 229, 255, 0.2), 0 0 70px rgba(0, 229, 255, 0.08);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 16px;
      margin: 16px auto;
    }

    h2 {
      margin: 0;
      text-align: center;
    }

    button {
      padding: 6px 12px;
      margin: 5px;
      background: rgba(5, 8, 18, 0.8);
      border: 2px solid var(--neon-cyan);
      color: var(--neon-cyan);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: var(--neon-cyan);
      color: #031018;
    }

    button:disabled {
      border-color: #555;
      color: #555;
      cursor: not-allowed;
      box-shadow: none;
      background: rgba(5, 8, 18, 0.8);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Bar visualization */
    .bars {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      height: 250px;
      margin-top: 20px;
      gap: 10px;
    }

    .bar {
      width: 50px;
      background: rgba(0, 229, 255, 0.15);
      border: 2px solid var(--neon-cyan);
      border-radius: 6px 6px 0 0;
      color: var(--text);
      text-align: center;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 5px;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s, height 0.3s;
    }

    /* Node being compared (heapify active / compare) */
    .active {
      background: rgba(255, 233, 79, 0.2) !important;
      border-color: var(--neon-yellow) !important;
      box-shadow: 0 0 15px rgba(255, 233, 79, 0.5) !important;
      color: var(--neon-yellow);
    }

    /* Two nodes being swapped */
    .swap {
      background: rgba(255, 79, 216, 0.2) !important;
      border-color: var(--neon-pink) !important;
      box-shadow: 0 0 15px rgba(255, 79, 216, 0.5) !important;
      color: var(--neon-pink);
    }

    /* Sorted (extracted) elements on the right */
    .sorted {
      background: rgba(125, 255, 155, 0.2) !important;
      border-color: var(--neon-lime) !important;
      box-shadow: 0 0 15px rgba(125, 255, 155, 0.4) !important;
      color: var(--neon-lime);
    }

    .stats {
      text-align: center;
      color: var(--neon-amber);
      font-size: 15px;
      margin-bottom: 5px;
    }

    .stats span {
      font-weight: bold;
    }

    .math {
      text-align: center;
      color: var(--neon-lime);
      font-size: 14px;
    }

    .operation-box {
      margin-top: 8px;
      padding: 10px 12px;
      border: 2px solid var(--neon-cyan);
      border-radius: 10px;
      background: rgba(0, 229, 255, 0.08);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
      color: var(--text);
      transition: all 0.25s ease;
      text-align: center;
    }

    .operation-box.info {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
    }

    .operation-box.success {
      border-color: var(--neon-lime);
      background: rgba(125, 255, 155, 0.12);
      box-shadow: 0 0 16px rgba(125, 255, 155, 0.28);
    }

    .operation-box.error {
      border-color: var(--neon-pink);
      background: rgba(255, 79, 216, 0.1);
      box-shadow: 0 0 16px rgba(255, 79, 216, 0.24);
    }

    /* Tree canvas */
    #treeCanvas {
      background: rgba(0, 229, 255, 0.02);
      border: 2px solid var(--neon-cyan);
      border-radius: 10px;
      box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.12);
      width: 100%;
      max-width: 800px;
      align-self: center;
    }

    @media (max-width: 900px) {
      #treeCanvas {
        height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Heap Sort Algorithm Visualizer (Max-Heap)</h2>

    <div class="controls">
      <button id="prevBtn" onclick="prev()">⬅ Back</button>
      <button id="nextBtn" onclick="next()">Next ➡</button>
      <button id="playBtn" onclick="play()">▶ Play</button>
      <button onclick="reset()" style="border-color: var(--neon-pink); color: var(--neon-pink);">Reset</button>
    </div>

    <div class="bars" id="bars"></div>

    <div class="stats">
      Comparisons: <span id="comparisons">0</span>
    </div>

    <div class="math">
      Complexity: Time -> O(n log n) | Space -> O(1) | Not stable
    </div>

    <div class="operation-box info" id="message">Visualizer initialized. Press Play or Next to begin.</div>

    <canvas id="treeCanvas" width="800" height="260"></canvas>

  </div>

  <script>
    let original = [8, 3, 5, 1, 9, 6];
    let steps = [];
    let current = 0;
    let interval;

    function setMessage(text, type = "info") {
      const messageEl = document.getElementById("message");
      if (messageEl) {
        messageEl.innerText = text;
        messageEl.className = "operation-box " + type;
      }
    }

    function generateSteps(arr) {
      let local = [];
      let comp = 0;

      // Initial state
      local.push({
        array: [...arr],
        active: -1,
        compare: -1,
        swap: null,
        sorted: arr.length,
        comp: comp,
        message: "Initial array state. Building the Max-Heap..."
      });

      function heapify(a, n, i) {
        let largest = i;
        let l = 2 * i + 1;
        let r = 2 * i + 2;

        if (l < n) {
          comp++;
          local.push({
            array: [...a],
            active: i,
            compare: l,
            swap: null,
            sorted: n,
            comp,
            message: `Heapify: comparing node ${a[i]} (index ${i}) with left child ${a[l]} (index ${l}).`
          });
          if (a[l] > a[largest]) largest = l;
        }

        if (r < n) {
          comp++;
          local.push({
            array: [...a],
            active: i,
            compare: r,
            swap: null,
            sorted: n,
            comp,
            message: `Heapify: comparing node ${a[i]} (index ${i}) with right child ${a[r]} (index ${r}).`
          });
          if (a[r] > a[largest]) largest = r;
        }

        if (largest !== i) {
          [a[i], a[largest]] = [a[largest], a[i]];
          local.push({
            array: [...a],
            active: -1,
            compare: -1,
            swap: [i, largest],
            sorted: n,
            comp,
            message: `Swapped ${a[largest]} ↔ ${a[i]} to restore max-heap property.`
          });
          heapify(a, n, largest);
        }
      }

      let a = [...arr];
      let n = a.length;

      // Phase 1 — Build max-heap
      for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
        heapify(a, n, i);
      }

      local.push({
        array: [...a],
        active: -1,
        compare: -1,
        swap: null,
        sorted: n,
        comp,
        message: `Max-Heap built: ${a.join(", ")}. Now extracting max elements one by one.`
      });

      // Phase 2 — Extract elements
      for (let i = n - 1; i > 0; i--) {
        [a[0], a[i]] = [a[i], a[0]];
        local.push({
          array: [...a],
          active: -1,
          compare: -1,
          swap: [0, i],
          sorted: i,
          comp,
          message: `Extracted max ${a[i]} — moved to sorted position ${i}.`
        });
        heapify(a, i, 0);
      }

      // Final state
      local.push({
        array: [...a],
        active: -1,
        compare: -1,
        swap: null,
        sorted: 0,
        comp,
        message: "Array perfectly sorted!"
      });

      return local;
    }

    function render() {
      let step = steps[current];
      const isFinal = current === steps.length - 1;

      // Render bars
      let barsContainer = document.getElementById("bars");
      barsContainer.innerHTML = "";

      step.array.forEach((val, i) => {
        let div = document.createElement("div");
        div.className = "bar";
        div.style.height = (val * 25) + "px";
        div.innerText = val;

        if (isFinal || i >= step.sorted) {
          div.classList.add("sorted");
        } else if (step.swap && step.swap.includes(i)) {
          div.classList.add("swap");
        } else if (i === step.active || i === step.compare) {
          div.classList.add("active");
        }

        barsContainer.appendChild(div);
      });

      document.getElementById("comparisons").innerText = step.comp;

      if (isFinal) {
        setMessage(step.message || "Array is sorted!", "success");
      } else {
        setMessage(step.message || "Visualizing heap sort...", "info");
      }

      drawTree(step);
      updateButtons();
    }

    function drawTree(step) {
      const canvas = document.getElementById("treeCanvas");
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const arr = step.array;
      const isFinal = current === steps.length - 1;
      const levelGap = 70;
      const radius = 20;

      // Pre-compute node positions
      const positions = arr.map((_, i) => {
        const level = Math.floor(Math.log2(i + 1));
        const nodesInLevel = Math.pow(2, level);
        const indexInLevel = i - (nodesInLevel - 1);
        const spacing = canvas.width / (nodesInLevel + 1);
        return {
          x: spacing * (indexInLevel + 1),
          y: 40 + level * levelGap
        };
      });

      // Draw edges first
      arr.forEach((_, i) => {
        if (i > 0) {
          const parent = Math.floor((i - 1) / 2);
          ctx.beginPath();
          ctx.moveTo(positions[parent].x, positions[parent].y + radius);
          ctx.lineTo(positions[i].x, positions[i].y - radius);
          ctx.strokeStyle = "rgba(0, 229, 255, 0.3)";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      });

      // Draw nodes
      arr.forEach((val, i) => {
        const { x, y } = positions[i];
        const inSorted = i >= step.sorted;
        const isSwap = step.swap && step.swap.includes(i);
        const isActive = i === step.active || i === step.compare;

        // Pick fill/stroke colour
        let strokeColor = "rgba(0, 229, 255, 0.6)";
        let fillColor = "rgba(0, 229, 255, 0.08)";
        let textColor = "#e9f5ff";

        if (isFinal || inSorted) {
          strokeColor = "#7dff9b";
          fillColor = "rgba(125, 255, 155, 0.15)";
          textColor = "#7dff9b";
        } else if (isSwap) {
          strokeColor = "#ff4fd8";
          fillColor = "rgba(255, 79, 216, 0.2)";
          textColor = "#ff4fd8";
        } else if (isActive) {
          strokeColor = "#ffe94f";
          fillColor = "rgba(255, 233, 79, 0.2)";
          textColor = "#ffe94f";
        }

        ctx.beginPath();
        ctx.arc(x, y, radius, 0, 2 * Math.PI);
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 2;
        ctx.fillStyle = fillColor;
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = textColor;
        ctx.font = "bold 13px 'Fira Code', monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(val, x, y);
      });
    }

    function next() {
      if (current < steps.length - 1) {
        current++;
        clickSound();
        render();
      }
    }

    function prev() {
      if (current > 0) {
        current--;
        render();
      }
    }

    function play() {
      clearInterval(interval);
      document.getElementById("playBtn").innerText = "⏸ Pause";
      document.getElementById("playBtn").onclick = pause;

      if (current >= steps.length - 1) {
        current = 0;
      }

      interval = setInterval(() => {
        if (current < steps.length - 1) {
          current++;
          clickSound();
          render();
        } else {
          pause();
          victorySound();
        }
      }, 600);
    }

    function pause() {
      clearInterval(interval);
      document.getElementById("playBtn").innerText = "▶ Play";
      document.getElementById("playBtn").onclick = play;
    }

    function reset() {
      clearInterval(interval);
      document.getElementById("playBtn").innerText = "▶ Play";
      document.getElementById("playBtn").onclick = play;
      current = 0;
      setMessage("Visualizer reset. Press Play or Next to begin.", "info");
      render();
    }

    function updateButtons() {
      document.getElementById("prevBtn").disabled = current === 0;
      document.getElementById("nextBtn").disabled = current === steps.length - 1;
    }

    function clickSound() {
      const a = new (window.AudioContext || window.webkitAudioContext)();
      const o = a.createOscillator();
      const g = a.createGain();
      o.frequency.value = 1100;
      g.gain.value = 0.1;
      o.connect(g);
      g.connect(a.destination);
      o.start();
      o.stop(a.currentTime + 0.05);
    }

    function victorySound() {
      const a = new (window.AudioContext || window.webkitAudioContext)();
      const o = a.createOscillator();
      const g = a.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(400, a.currentTime);
      o.frequency.exponentialRampToValueAtTime(1500, a.currentTime + 0.7);
      g.gain.setValueAtTime(0.2, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.8);
      o.connect(g);
      g.connect(a.destination);
      o.start();
      o.stop(a.currentTime + 0.8);
    }

    steps = generateSteps(original);
    render();
  </script>
</body>

</html>
