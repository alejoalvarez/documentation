<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Programming Visualization</title>
    <style>
        :root {
            --bg-dark: #030507;
            --bg-panel: #0a0f16;
            --border-glow: rgba(0, 255, 255, 0.3);
            --text-main: #e0f2fe;
            --text-dim: #7dd3fc;

            --c-node: #00ffff;
            --c-mem: #00ff9d;
            --c-exp: #ff3c00;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: transparent;
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-panel);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.05);
            flex-wrap: wrap;
            gap: 15px;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: rgba(0, 210, 255, 0.1);
            color: var(--c-node);
            border: 1px solid var(--c-node);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        .btn:hover {
            background: rgba(0, 210, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #555;
            color: #888;
        }

        .stat-bar {
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .layout {
            display: flex;
            gap: 20px;
            flex-direction: column;
        }

        @media(min-width: 800px) {
            .layout {
                flex-direction: row;
            }
        }

        .viz-panel {
            flex: 1;
            background: var(--bg-panel);
            border-radius: 12px;
            border: 1px solid var(--border-glow);
            padding: 20px;
            position: relative;
            min-height: 400px;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
        }

        .cache-panel {
            width: 100%;
            background: var(--bg-panel);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 157, 0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: inset 0 0 30px rgba(0, 255, 157, 0.05);
        }

        @media(min-width: 800px) {
            .cache-panel {
                width: 300px;
            }
        }

        .panel-title {
            font-family: monospace;
            font-size: 1rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .cache-title {
            color: var(--c-mem);
            border-color: rgba(0, 255, 157, 0.2);
        }

        .cache-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
        }

        .mem-slot {
            background: rgba(0, 0, 0, 0.6);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-family: monospace;
            color: #666;
            transition: 0.3s;
        }

        .mem-slot.filled {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid var(--c-mem);
            color: var(--c-mem);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
            animation: pulse 0.5s;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
            }

            100% {
                transform: scale(1);
            }
        }

        /* D3 svg wrapper */
        .svg-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            user-select: none;
        }

        .node circle {
            fill: #000;
            stroke: var(--c-node);
            stroke-width: 2px;
            transition: all 0.3s;
        }

        .node.computing circle {
            fill: rgba(0, 255, 255, 0.2);
            stroke-width: 4px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 255, 0.8));
        }

        .node.computed circle {
            stroke: #555;
            fill: #111;
        }

        .node.memoized circle {
            stroke: var(--c-mem);
            fill: rgba(0, 255, 157, 0.1);
            stroke-width: 3px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 157, 0.6));
        }

        .node.expensive circle {
            stroke: var(--c-exp);
            fill: rgba(255, 60, 0, 0.1);
            filter: drop-shadow(0 0 8px rgba(255, 60, 0, 0.6));
        }

        .node text {
            font-family: monospace;
            font-size: 12px;
            fill: #fff;
            text-anchor: middle;
            dominant-baseline: central;
        }

        .link {
            fill: none;
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 2px;
            transition: 0.3s;
        }

        .link.active {
            stroke: var(--c-node);
            stroke-width: 3px;
            filter: drop-shadow(0 0 5px rgba(0, 255, 255, 0.5));
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

    <div class="header">
        <div class="title">Fibonacci Tree: O(2^n) vs Memoization</div>
        <div class="controls">
            <div class="stat-bar">Ops: <span id="op-counter">0</span></div>
            <button class="btn" style="border-color: var(--c-exp); color: var(--c-exp)" id="btn-brute"
                onclick="runSim(false)">Brute Force</button>
            <button class="btn" style="border-color: var(--c-mem); color: var(--c-mem)" id="btn-memo"
                onclick="runSim(true)">Memoized DP</button>
        </div>
    </div>

    <div class="layout">
        <div class="viz-panel" id="viz-wrapper">
            <svg class="svg-container" id="svg-canvas"></svg>
        </div>

        <div class="cache-panel">
            <div class="panel-title cache-title">DP Memo Array (Cache)</div>
            <div class="cache-grid" id="memo-grid">
                <!-- Javascript gen -->
            </div>
            <div
                style="font-size:0.8rem; color:#888; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                <span style="color:var(--c-exp)">■</span> Red nodes: Redundant recalculations <br>
                <span style="color:var(--c-mem)">■</span> Green nodes: Instant O(1) Cache lookups
            </div>
        </div>
    </div>

    <script>
        const FIB_NUM = 6;
        let ops = 0;
        let cache = {};

        const grid = document.getElementById('memo-grid');
        const opCounter = document.getElementById('op-counter');
        const btnBrute = document.getElementById('btn-brute');
        const btnMemo = document.getElementById('btn-memo');

        let targetFib;

        // Generate pure recursive tree data structure
        let nodeId = 0;
        function generateFibTreeD3(n) {
            let node = { id: `id-${nodeId++}`, n: n, val: null, children: [] };
            if (n <= 1) {
                node.val = n;
                return node;
            }
            node.children.push(generateFibTreeD3(n - 1));
            node.children.push(generateFibTreeD3(n - 2));
            return node;
        }

        let treeData;
        let root;
        let svg, g, link, nodeSelection;

        function renderD3Tree() {
            d3.select("#svg-canvas").selectAll("*").remove();
            const container = document.getElementById('viz-wrapper');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select("#svg-canvas");
            g = svg.append("g").attr("transform", "translate(0, 40)");

            const treeLayout = d3.tree().size([width - 40, height - 80]);

            nodeId = 0;
            treeData = generateFibTreeD3(FIB_NUM);
            root = d3.hierarchy(treeData);
            treeLayout(root);

            link = g.selectAll(".link")
                .data(root.links())
                .enter().append("path")
                .attr("class", d => `link link-${d.source.data.id}-${d.target.data.id}`)
                .attr("d", d3.linkVertical().x(d => d.x).y(d => d.y));

            nodeSelection = g.selectAll(".node")
                .data(root.descendants())
                .enter().append("g")
                .attr("class", d => `node node-${d.data.id}`)
                .attr("transform", d => `translate(${d.x},${d.y})`);

            nodeSelection.append("circle")
                .attr("r", 15);

            nodeSelection.append("text")
                .attr("dy", 1)
                .text(d => `f(${d.data.n})`);
        }

        function initCacheUI() {
            grid.innerHTML = '';
            for (let i = 0; i <= FIB_NUM; i++) {
                grid.innerHTML += `
                    <div class="mem-slot" id="slot-${i}">
                        <div style="font-size:0.6rem; color:#444">F(${i})</div>
                        <div id="val-${i}">--</div>
                    </div>
                `;
            }
        }

        async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function traverseSim(d3Node, useMemo) {
            ops++;
            opCounter.textContent = ops;
            const n = d3Node.data.n;
            const id = d3Node.data.id;

            const gE = d3.select(`.node-${id}`);
            gE.classed('computing', true);
            await sleep(300);

            // Check Cache
            if (useMemo && cache[n] !== undefined) {
                gE.classed('computing', false);
                gE.classed('memoized', true);

                // Highlight cache slot momentarily
                const slt = document.getElementById(`slot-${n}`);
                slt.style.transform = "scale(1.1)";
                slt.style.boxShadow = "0 0 15px var(--c-mem)";
                await sleep(200);
                slt.style.transform = "scale(1)";
                slt.style.boxShadow = "0 0 10px rgba(0,255,157,0.2)";

                return cache[n];
            }

            if (!useMemo && cache[n] !== undefined) {
                // We've calculated this before, but DP is off. This is a redundant O(2^n) disaster.
                gE.classed('computing', false);
                gE.classed('expensive', true);
                await sleep(200);
            }

            let result;
            if (n <= 1) {
                result = n;
            } else {
                let d3Left = d3Node.children[0];
                let d3Right = d3Node.children[1];

                d3.select(`.link-${id}-${d3Left.data.id}`).classed('active', true);
                let leftVal = await traverseSim(d3Left, useMemo);
                d3.select(`.link-${id}-${d3Left.data.id}`).classed('active', false);

                d3.select(`.link-${id}-${d3Right.data.id}`).classed('active', true);
                let rightVal = await traverseSim(d3Right, useMemo);
                d3.select(`.link-${id}-${d3Right.data.id}`).classed('active', false);

                result = leftVal + rightVal;
            }

            // Write to Cache
            if (cache[n] === undefined) {
                cache[n] = result;
                const slt = document.getElementById(`slot-${n}`);
                slt.classList.add('filled');
                document.getElementById(`val-${n}`).textContent = result;
            }

            gE.classed('computing', false).classed('expensive', false);
            if (!gE.classed('memoized')) {
                gE.classed('computed', true);
                gE.select('text').text(result).style('fill', '#00ffff');
            }

            await sleep(100);
            return result;
        }

        async function runSim(useMemo) {
            btnBrute.disabled = true;
            btnMemo.disabled = true;

            ops = 0;
            opCounter.textContent = ops;
            cache = {};
            initCacheUI();
            renderD3Tree();

            await sleep(500);
            await traverseSim(root, useMemo);

            btnBrute.disabled = false;
            btnMemo.disabled = false;
        }

        // Setup
        window.addEventListener('resize', renderD3Tree);
        initCacheUI();
        renderD3Tree();
    </script>
</body>

</html>
