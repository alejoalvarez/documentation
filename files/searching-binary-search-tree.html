<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Binary Search Tree Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04050d;
      --panel: #0a0d1a;
      --text: #e9f5ff;
      --neon-cyan: #00e5ff;
      --neon-cyan-soft: rgba(0, 229, 255, 0.2);
      --neon-pink: #ff4fd8;
      --neon-lime: #7dff9b;
      --neon-amber: #ffb347;
      --neon-yellow: #ffe94f;
      --neon-purple: #b549ff;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 50% 20%, #11152b 0%, var(--bg) 45%, #02030a 100%);
      color: var(--text);
      font-family: 'Fira Code', monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0;
    }

    .container {
      width: calc(100% - 32px);
      max-width: 1000px;
      height: auto;
      background: linear-gradient(180deg, rgba(10, 13, 26, 0.9), rgba(6, 9, 20, 0.95));
      border: 1px solid var(--neon-cyan-soft);
      border-radius: 14px;
      box-shadow: 0 0 28px rgba(0, 229, 255, 0.2), 0 0 70px rgba(0, 229, 255, 0.08);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 16px;
      margin: 16px auto;
    }

    h2 {
      margin: 0;
      text-align: center;
      color: var(--text);
    }

    .inputs-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input {
      padding: 8px 12px;
      background: rgba(5, 8, 18, 0.8);
      color: var(--text);
      border: 2px solid var(--neon-cyan);
      border-radius: 8px;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    #valuesInput {
      width: 220px;
    }

    #searchInput,
    #deleteInput {
      width: 120px;
      text-align: center;
    }

    button {
      padding: 8px 14px;
      background: rgba(5, 8, 18, 0.8);
      border: 2px solid var(--neon-cyan);
      color: var(--neon-cyan);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: var(--neon-cyan);
      color: #031018;
    }

    button:disabled {
      border-color: #555;
      color: #555;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Warning style buttons for Delete */
    .btn-delete {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: 0 0 10px rgba(255, 79, 216, 0.15);
    }

    .btn-delete:hover:not(:disabled) {
      background: var(--neon-pink);
      color: #031018;
    }

    /* Success style button for Search */
    .btn-search {
      border-color: var(--neon-lime);
      color: var(--neon-lime);
      box-shadow: 0 0 10px rgba(125, 255, 155, 0.15);
    }

    .btn-search:hover:not(:disabled) {
      background: var(--neon-lime);
      color: #031018;
    }

    canvas {
      background: rgba(0, 229, 255, 0.02);
      border: 2px solid var(--neon-cyan);
      border-radius: 12px;
      box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.12);
      width: 100%;
      height: 400px;
      /* Fixed height for canvas */
      display: block;
    }

    .controls-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats {
      text-align: center;
      color: var(--neon-amber);
      font-size: 15px;
      font-weight: bold;
    }

    .math {
      text-align: center;
      color: var(--neon-lime);
      font-size: 13px;
    }

    .operation-box {
      margin-top: 4px;
      padding: 10px 14px;
      border: 2px solid var(--neon-cyan);
      border-radius: 8px;
      background: rgba(0, 229, 255, 0.08);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
      color: var(--text);
      transition: all 0.25s ease;
      text-align: center;
      font-size: 15px;
      min-height: 22px;
    }

    .operation-box.info {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
    }

    .operation-box.success {
      border-color: var(--neon-lime);
      background: rgba(125, 255, 155, 0.12);
      box-shadow: 0 0 16px rgba(125, 255, 155, 0.28);
    }

    .operation-box.error {
      border-color: var(--neon-pink);
      background: rgba(255, 79, 216, 0.1);
      box-shadow: 0 0 16px rgba(255, 79, 216, 0.24);
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Binary Search Tree Visualizer</h2>

    <div class="inputs-row">
      <div class="input-group">
        <input id="valuesInput" value="50,30,70,20,40,60,80" title="Comma-separated values to build the tree">
        <button onclick="init()">Build BST</button>
      </div>
      <div class="input-group">
        <input id="searchInput" type="number" placeholder="Search...">
        <button class="btn-search" onclick="startSearch()">Search</button>
      </div>
      <div class="input-group">
        <input id="deleteInput" type="number" placeholder="Delete...">
        <button class="btn-delete" onclick="startDelete()">Delete</button>
      </div>
    </div>

    <div class="controls-row">
      <button onclick="startTraversal('pre')">PreOrder</button>
      <button onclick="startTraversal('in')">InOrder</button>
      <button onclick="startTraversal('post')">PostOrder</button>
      <button id="playBtn" onclick="togglePlayBuilder()" style="margin-left: 20px;">▶ Play Build</button>
    </div>

    <canvas id="treeCanvas" width="960" height="400"></canvas>

    <div class="stats" id="stats">Tree Height: 0</div>
    <div class="math">Complexity: Average O(log n) | Worst case O(n)</div>

    <div class="operation-box info" id="message">Visualizer initialized. Enter nodes to build tree.</div>

  </div>

  <script>
    class Node {
      constructor(value) {
        this.value = value;
        this.left = null;
        this.right = null;
      }
    }

    let root = null;
    let buildSteps = [];
    let currentBuildStep = 0;
    let interval = null;
    let isPlayingBuild = false;

    const canvas = document.getElementById("treeCanvas");
    const ctx = canvas.getContext("2d");
    const stats = document.getElementById("stats");

    function setMessage(text, type = "info") {
      const msg = document.getElementById("message");
      msg.innerText = text;
      msg.className = "operation-box " + type;
    }

    function insert(node, value) {
      if (!node) return new Node(value);
      if (value < node.value) {
        node.left = insert(node.left, value);
      } else if (value > node.value) {
        node.right = insert(node.right, value);
      }
      return node;
    }

    function generateSteps(values) {
      root = null;
      let temp = [];
      values.forEach(v => {
        root = insert(root, v);
        temp.push(JSON.parse(JSON.stringify(root))); // Deep copy for steps
      });
      return temp;
    }

    function height(node) {
      if (!node) return 0;
      return 1 + Math.max(height(node.left), height(node.right));
    }

    function drawTree(node, x, y, offsetX, highlightNode = null, highlightColor = "#00ffff") {
      if (!node) return;

      const LINE_COLOR = "rgba(0, 229, 255, 0.4)";
      const NODE_RADIUS = 22;

      // Draw left branch
      if (node.left) {
        ctx.beginPath();
        ctx.moveTo(x, y + NODE_RADIUS);
        ctx.lineTo(x - offsetX, y + 80 - NODE_RADIUS);
        ctx.strokeStyle = LINE_COLOR;
        ctx.lineWidth = 2;
        ctx.stroke();
        drawTree(node.left, x - offsetX, y + 80, offsetX / 1.7, highlightNode, highlightColor);
      }

      // Draw right branch
      if (node.right) {
        ctx.beginPath();
        ctx.moveTo(x, y + NODE_RADIUS);
        ctx.lineTo(x + offsetX, y + 80 - NODE_RADIUS);
        ctx.strokeStyle = LINE_COLOR;
        ctx.lineWidth = 2;
        ctx.stroke();
        drawTree(node.right, x + offsetX, y + 80, offsetX / 1.7, highlightNode, highlightColor);
      }

      // Draw node circle
      ctx.beginPath();
      ctx.arc(x, y, NODE_RADIUS, 0, 2 * Math.PI);

      let fill = "rgba(10, 13, 26, 0.9)"; // Dark background
      let border = "#00e5ff"; // Cyan border
      let textCol = "#e9f5ff";

      if (highlightNode === node.value) {
        // Base highlight based on the operation color
        border = highlightColor;
        fill = highlightColor === "#00e5ff" ? "rgba(0, 229, 255, 0.3)" :
          highlightColor === "#7dff9b" ? "rgba(125, 255, 155, 0.3)" :
            highlightColor === "#ff4fd8" ? "rgba(255, 79, 216, 0.3)" : "rgba(255, 233, 79, 0.3)";
        textCol = highlightColor;

        ctx.shadowBlur = 15;
        ctx.shadowColor = highlightColor;
      } else {
        ctx.shadowBlur = 5;
        ctx.shadowColor = "rgba(0, 229, 255, 0.5)";
      }

      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = border;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Reset shadow for text
      ctx.shadowBlur = 0;

      // Draw text
      ctx.fillStyle = textCol;
      ctx.font = "bold 15px 'Fira Code'";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(node.value, x, y + 1);
    }

    function render(treeState, highlightVal = null, highlightColor = "#00ffff") {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (treeState) {
        drawTree(treeState, canvas.width / 2, 40, 220, highlightVal, highlightColor);
        stats.textContent = "Tree Height: " + height(treeState);
      } else {
        stats.textContent = "Tree Height: 0";
      }
    }

    // Initialize/Rebuild full tree instantly
    function init() {
      clearInterval(interval);
      isPlayingBuild = false;
      document.getElementById("playBtn").innerText = "▶ Play Build";

      const str = document.getElementById("valuesInput").value;
      if (!str) {
        root = null;
        render(null);
        return;
      }

      let values = str.split(",").map(s => parseInt(s.trim())).filter(n => !isNaN(n));
      buildSteps = generateSteps(values);

      // Render the final fully-built state directly
      if (buildSteps.length > 0) {
        currentBuildStep = buildSteps.length - 1;
        render(buildSteps[currentBuildStep]);
        setMessage("Binary Search Tree built! Ready for operations.");
      } else {
        render(null);
      }
    }

    function togglePlayBuilder() {
      if (isPlayingBuild) {
        clearInterval(interval);
        isPlayingBuild = false;
        document.getElementById("playBtn").innerText = "▶ Play Build";
      } else {
        playFromStart();
      }
    }

    function playFromStart() {
      if (buildSteps.length === 0) return;
      clearInterval(interval);
      isPlayingBuild = true;
      document.getElementById("playBtn").innerText = "⏸ Pause Build";

      currentBuildStep = 0;
      render(buildSteps[currentBuildStep]);
      setMessage("Animating tree build process...");

      interval = setInterval(() => {
        if (currentBuildStep < buildSteps.length - 1) {
          currentBuildStep++;
          render(buildSteps[currentBuildStep]);
          clickSound();
        } else {
          clearInterval(interval);
          isPlayingBuild = false;
          document.getElementById("playBtn").innerText = "▶ Play Build";
          setMessage("Tree build complete!", "success");
          victorySound();
        }
      }, 700);
    }

    // --- TRAVERSALS ---
    function traverse(node, type, list = []) {
      if (!node) return;
      if (type === "pre") list.push(node.value);
      traverse(node.left, type, list);
      if (type === "in") list.push(node.value);
      traverse(node.right, type, list);
      if (type === "post") list.push(node.value);
      return list;
    }

    function startTraversal(type) {
      if (!root) return;
      clearInterval(interval);
      isPlayingBuild = false;
      document.getElementById("playBtn").innerText = "▶ Play Build";

      let order = traverse(root, type, []);
      let i = 0;
      let orderList = [];

      setMessage(`Starting ${type === 'in' ? 'In-Order' : type === 'pre' ? 'Pre-Order' : 'Post-Order'} Traversal...`);

      interval = setInterval(() => {
        if (i < order.length) {
          orderList.push(order[i]);
          render(root, order[i], "#ffe94f"); // Yellow highlight for traversal
          setMessage(`${type === 'in' ? 'In-Order' : type === 'pre' ? 'Pre-Order' : 'Post-Order'}: [ ${orderList.join(", ")} ]`);
          clickSound();
          i++;
        } else {
          clearInterval(interval);
          render(root); // clear highlight
          setMessage(`Traversal complete! Result: [ ${orderList.join(", ")} ]`, "success");
          victorySound();
        }
      }, 600);
    }

    // --- SEARCH ---
    function doSearch(node, value, trace = []) {
      if (!node) return trace;
      trace.push(node.value);
      if (value === node.value) return trace;
      if (value < node.value) return doSearch(node.left, value, trace);
      else return doSearch(node.right, value, trace);
    }

    function startSearch() {
      if (!root) return;
      clearInterval(interval);
      isPlayingBuild = false;

      let valStr = document.getElementById("searchInput").value;
      if (valStr.trim() === "") return;
      let value = parseInt(valStr);

      let trace = doSearch(root, value, []);
      let i = 0;

      setMessage(`Searching for ${value} in the BST...`);

      interval = setInterval(() => {
        if (i < trace.length) {
          let curr = trace[i];
          render(root, curr, "#00e5ff"); // Cyan for intermediate nodes

          if (curr === value) {
            setMessage(`Found ${value}! It is in the tree.`, "success");
          } else if (value < curr) {
            setMessage(`${value} < ${curr}, moving Left.`);
          } else {
            setMessage(`${value} > ${curr}, moving Right.`);
          }

          clickSound();
          i++;
        } else {
          clearInterval(interval);
          if (trace[trace.length - 1] === value) {
            render(root, value, "#7dff9b"); // Lime for found
            victorySound();
          } else {
            render(root); // clear highlight
            setMessage(`Target ${value} is NOT in the tree. Found null.`, "error");
            errorSound();
          }
        }
      }, 800);
    }

    // --- DELETE ---
    function findMin(node) {
      while (node.left) {
        node = node.left;
      }
      return node;
    }

    function deleteNode(node, value) {
      if (!node) return null;

      if (value < node.value) {
        node.left = deleteNode(node.left, value);
      } else if (value > node.value) {
        node.right = deleteNode(node.right, value);
      } else {
        // Node found
        // Case 1: No child
        if (!node.left && !node.right) return null;

        // Case 2: One child
        if (!node.left) return node.right;
        if (!node.right) return node.left;

        // Case 3: Two children
        // Get inorder successor (smallest in the right subtree)
        let temp = findMin(node.right);
        node.value = temp.value; // Copy value 
        node.right = deleteNode(node.right, temp.value); // Delete successor
      }
      return node;
    }

    function startDelete() {
      if (!root) return;
      clearInterval(interval);

      let valStr = document.getElementById("deleteInput").value;
      if (valStr.trim() === "") return;
      let value = parseInt(valStr);

      // We use search trace to animate finding the node first
      let trace = doSearch(root, value, []);
      let i = 0;

      setMessage(`Initiating deletion for ${value}. First, searching for node...`);

      interval = setInterval(() => {
        if (i < trace.length) {
          let curr = trace[i];
          render(root, curr, "#ff4fd8"); // Pink for delete highlighting
          clickSound();
          i++;
        } else {
          clearInterval(interval);

          if (trace[trace.length - 1] === value) {
            setMessage(`Node ${value} found. Applying BST deletion logic...`, "warning");

            // Actually delete
            setTimeout(() => {
              root = deleteNode(root, value);
              render(root);
              victorySound();
              setMessage(`Successfully deleted ${value} from the tree.`, "success");

              // Rewrite values logic to maintain state string if possible (optional simplification: just update visually and keep the state decoupled from string input)
            }, 800);

          } else {
            render(root);
            setMessage(`Node ${value} does not exist in the tree. Cannot delete.`, "error");
            errorSound();
          }
        }
      }, 800);
    }

    /* SOUNDS */
    function clickSound() {
      const a = new (window.AudioContext || window.webkitAudioContext)();
      const o = a.createOscillator();
      const g = a.createGain();
      o.frequency.value = 800;
      g.gain.value = 0.05;
      o.connect(g);
      g.connect(a.destination);
      o.start();
      o.stop(a.currentTime + 0.05);
    }

    function victorySound() {
      const a = new (window.AudioContext || window.webkitAudioContext)();
      const o = a.createOscillator();
      const g = a.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(400, a.currentTime);
      o.frequency.exponentialRampToValueAtTime(1200, a.currentTime + 0.6);
      g.gain.setValueAtTime(0.1, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.7);
      o.connect(g);
      g.connect(a.destination);
      o.start();
      o.stop(a.currentTime + 0.7);
    }

    function errorSound() {
      const a = new (window.AudioContext || window.webkitAudioContext)();
      const o = a.createOscillator();
      const g = a.createGain();
      o.type = "sawtooth";
      o.frequency.setValueAtTime(200, a.currentTime);
      o.frequency.exponentialRampToValueAtTime(100, a.currentTime + 0.4);
      g.gain.setValueAtTime(0.1, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.5);
      o.connect(g);
      g.connect(a.destination);
      o.start();
      o.stop(a.currentTime + 0.5);
    }

    // Initialize with default values on load
    init();

    // Rebuild tree strictly on change/enter on the input box
    document.getElementById("valuesInput").addEventListener("change", init);
  </script>
</body>

</html>
