<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Topological Sort Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04050d;
      --panel: #0a0d1a;
      --text: #e9f5ff;
      --neon-cyan: #00e5ff;
      --neon-cyan-soft: rgba(0, 229, 255, 0.2);
      --neon-pink: #ff4fd8;
      --neon-lime: #7dff9b;
      --neon-amber: #ffb347;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 50% 20%, #11152b 0%, var(--bg) 45%, #02030a 100%);
      color: var(--text);
      font-family: 'Fira Code', monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: unset;
      padding: 0;
    }

    .container {
      width: calc(100% - 32px);
      max-width: 1200px;
      min-height: unset;
      height: auto;
      background: linear-gradient(180deg, rgba(10, 13, 26, 0.9), rgba(6, 9, 20, 0.95));
      border: 1px solid var(--neon-cyan-soft);
      border-radius: 14px;
      box-shadow: 0 0 28px rgba(0, 229, 255, 0.2), 0 0 70px rgba(0, 229, 255, 0.08);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 16px;
      margin: 16px auto;
    }

    h2 {
      margin: 0;
    }

    canvas {
      background: rgba(0, 229, 255, 0.02);
      border: 2px solid var(--neon-cyan);
      border-radius: 10px;
      box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.12);
      width: 100%;
      max-width: 1060px;
      align-self: center;
    }

    button,
    input,
    select {
      padding: 6px 10px;
      background: rgba(5, 8, 18, 0.8);
      border: 2px solid var(--neon-cyan);
      color: var(--neon-cyan);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
      font-family: 'Fira Code', monospace;
      font-size: 14px;
    }

    button:hover {
      background: var(--neon-cyan);
      color: #031018;
      cursor: pointer;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stats {
      color: var(--neon-amber);
      margin-bottom: 5px;
    }

    .order {
      color: var(--neon-lime);
      font-size: 15px;
      font-weight: bold;
    }

    .math {
      color: var(--neon-lime);
      font-size: 13px;
      white-space: pre-wrap;
    }

    .operation-box {
      margin-top: 8px;
      padding: 10px 12px;
      border: 2px solid var(--neon-cyan);
      border-radius: 10px;
      background: rgba(0, 229, 255, 0.08);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
      color: var(--text);
      transition: all 0.25s ease;
    }

    .operation-box.info {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
    }

    .operation-box.success {
      border-color: var(--neon-lime);
      background: rgba(125, 255, 155, 0.12);
      box-shadow: 0 0 16px rgba(125, 255, 155, 0.28);
    }

    .operation-box.error {
      border-color: var(--neon-pink);
      background: rgba(255, 79, 216, 0.1);
      box-shadow: 0 0 16px rgba(255, 79, 216, 0.24);
    }

    @media (max-width: 900px) {
      canvas {
        height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Topological Sort Visualizer (Kahn's Algorithm)</h2>

    <div class="row">
      <div class="controls">
        <button onclick="startTopoSort()">Start Kahn's Topological Sort</button>
        <button onclick="resetGraph()" style="border-color: var(--neon-pink); color: var(--neon-pink);">Reset
          Graph</button>
      </div>
    </div>

    <canvas id="canvas" width="1060" height="420"></canvas>

    <div class="stats">
      Current Ordering: <span class="order" id="info"></span>
    </div>
    <div class="math" id="math">Complexity: Space/Time -> O(|V| + |E|) | Indegree Queue | DAGs only</div>

    <div class="operation-box info" id="message">Visualizer initialized. Choose Start Kahn's Topological Sort to locate
      nodes with 0 input edges.</div>

  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const nodes = {
      A: { x: 200, y: 210 },
      B: { x: 450, y: 100 },
      C: { x: 450, y: 320 },
      D: { x: 700, y: 210 },
      E: { x: 950, y: 210 }
    };

    const edges = [
      ["A", "B"],
      ["A", "C"],
      ["B", "D"],
      ["C", "D"],
      ["D", "E"]
    ];

    let indegree = {};
    let queue = [];
    let result = [];
    let interval = null;
    let evalEdge = null;

    function setMessage(text, type = "info") {
      const messageEl = document.getElementById("message");
      if (messageEl) {
        messageEl.innerText = text;
        messageEl.className = "operation-box " + type;
      }
    }

    function drawArrow(fromX, fromY, toX, toY, color, width = 2) {
      const headlen = 12;
      const dx = toX - fromX;
      const dy = toY - fromY;
      const angle = Math.atan2(dy, dx);
      const r = 22;
      const startX = fromX + r * Math.cos(angle);
      const startY = fromY + r * Math.sin(angle);
      const endX = toX - r * Math.cos(angle);
      const endY = toY - r * Math.sin(angle);

      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();

      // Arrowhead
      ctx.beginPath();
      ctx.moveTo(endX, endY);
      ctx.lineTo(endX - headlen * Math.cos(angle - Math.PI / 6), endY - headlen * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(endX - headlen * Math.cos(angle + Math.PI / 6), endY - headlen * Math.sin(angle + Math.PI / 6));
      ctx.lineTo(endX, endY);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawGraph() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw Edges
      edges.forEach(e => {
        let isEvaluated = evalEdge && evalEdge[0] === e[0] && evalEdge[1] === e[1];
        let isDone = result.includes(e[0]);
        let isTargetDone = result.includes(e[1]);

        let edgeColor = "rgba(255, 255, 255, 0.1)";
        let lineWidth = 2;

        if (isEvaluated) {
          edgeColor = "rgba(255, 79, 216, 0.8)"; // Magenta for evaluated
          lineWidth = 3;
        } else if (isDone && !isTargetDone) {
          edgeColor = "rgba(0, 229, 255, 0.4)"; // Cyan for processed
        } else if (isDone && isTargetDone) {
          edgeColor = "rgba(125, 255, 155, 0.2)";
        }

        drawArrow(nodes[e[0]].x, nodes[e[0]].y, nodes[e[1]].x, nodes[e[1]].y, edgeColor, lineWidth);
      });

      // Draw Nodes
      for (let node in nodes) {
        ctx.beginPath();
        ctx.arc(nodes[node].x, nodes[node].y, 22, 0, 2 * Math.PI);

        if (result.includes(node)) {
          ctx.fillStyle = "rgba(125, 255, 155, 0.15)";
          ctx.strokeStyle = "var(--neon-lime)";    // Lime for processed
        } else if (queue.includes(node)) {
          ctx.fillStyle = "rgba(0, 229, 255, 0.15)";
          ctx.strokeStyle = "var(--neon-cyan)";    // Cyan for in queue
        } else {
          ctx.fillStyle = "rgba(5, 8, 18, 0.8)";
          ctx.strokeStyle = "rgba(255, 255, 255, 0.2)"; // Default
        }

        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#e9f5ff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "bold 16px 'Fira Code'";
        ctx.fillText(node, nodes[node].x, nodes[node].y);

        // Draw indegree below the node
        if (indegree[node] !== undefined) {
          ctx.fillStyle = indegree[node] === 0 ? "var(--neon-cyan)" : "var(--neon-amber)";
          ctx.font = "bold 14px 'Fira Code'";
          ctx.fillText(`In: ${indegree[node]}`, nodes[node].x, nodes[node].y + 35);
        }
      }
    }

    function resetGraph() {
      indegree = {};
      result = [];
      queue = [];
      evalEdge = null;
      currentNode = null;
      clearInterval(interval);
      document.getElementById("info").innerText = "";

      // Compute Indegrees
      for (let n in nodes) indegree[n] = 0;
      edges.forEach(e => indegree[e[1]]++);

      drawGraph();
      setMessage("Graph state reset. Dependency graph (DAG) ready.", "info");
    }

    function startTopoSort() {
      resetGraph();

      for (let n in indegree) {
        if (indegree[n] === 0) queue.push(n);
      }

      setMessage(`Starting queue with 0-indegree nodes: [${queue.join(", ")}]`, "info");
      drawGraph();

      interval = setInterval(stepQueue, 1500);
    }

    let currentNode = null;
    let neighborIndex = 0;
    let currentNeighbors = [];

    function stepQueue() {
      if (!currentNode) {
        if (queue.length === 0) {
          clearInterval(interval);
          if (result.length === Object.keys(nodes).length) {
            setMessage(`Topological Sort successfully completed. No cycles detected.`, "success");
            victorySound();
          } else {
            setMessage(`Topological Sort failed. Cycle detected (not all nodes processed).`, "error");
          }
          evalEdge = null;
          drawGraph();
          return;
        }

        currentNode = queue.shift();
        result.push(currentNode);
        document.getElementById("info").innerText = result.join(" → ");
        currentNeighbors = edges.filter(e => e[0] === currentNode);
        neighborIndex = 0;

        setMessage(`Popped node ${currentNode} from queue and added to ordering. Resolving dependencies...`, "success");
        clickSound();
        drawGraph();
        return;
      }

      if (neighborIndex < currentNeighbors.length) {
        let e = currentNeighbors[neighborIndex];
        evalEdge = e;
        indegree[e[1]]--;

        if (indegree[e[1]] === 0) {
          queue.push(e[1]);
          setMessage(`Removed dependency for ${e[1]}. Indegree is 0! Adding ${e[1]} to queue.`, "info");
        } else {
          setMessage(`Removed dependency for ${e[1]}. Remaining indegree: ${indegree[e[1]]}`, "info");
        }

        clickSound();
        drawGraph();
        neighborIndex++;
      } else {
        currentNode = null;
        evalEdge = null;
        drawGraph();
        stepQueue();
      }
    }

    function clickSound() {
      const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctxAudio.createOscillator();
      const gain = ctxAudio.createGain();
      osc.frequency.value = 900;
      gain.gain.value = 0.1;
      osc.connect(gain);
      gain.connect(ctxAudio.destination);
      osc.start();
      osc.stop(ctxAudio.currentTime + 0.05);
    }

    function victorySound() {
      const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctxAudio.createOscillator();
      const gain = ctxAudio.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(400, ctxAudio.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1500, ctxAudio.currentTime + 0.6);
      gain.gain.setValueAtTime(0.2, ctxAudio.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctxAudio.currentTime + 0.7);
      osc.connect(gain);
      gain.connect(ctxAudio.destination);
      osc.start();
      osc.stop(ctxAudio.currentTime + 0.7);
    }

    // Initial state setup
    resetGraph();

  </script>

</body>

</html>
