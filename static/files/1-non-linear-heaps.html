<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Heap Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04050d;
      --panel: #0a0d1a;
      --text: #e9f5ff;
      --neon-cyan: #00e5ff;
      --neon-cyan-soft: rgba(0, 229, 255, 0.2);
      --neon-pink: #ff4fd8;
      --neon-lime: #7dff9b;
      --neon-amber: #ffb347;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 50% 20%, #11152b 0%, var(--bg) 45%, #02030a 100%);
      color: var(--text);
      font-family: 'Fira Code', monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: unset;
      padding: 0;
    }

    .container {
      width: calc(100% - 32px);
      max-width: 1200px;
      min-height: unset;
      height: auto;
      background: linear-gradient(180deg, rgba(10, 13, 26, 0.9), rgba(6, 9, 20, 0.95));
      border: 1px solid var(--neon-cyan-soft);
      border-radius: 14px;
      box-shadow: 0 0 28px rgba(0, 229, 255, 0.2), 0 0 70px rgba(0, 229, 255, 0.08);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 16px;
      margin: 16px auto;
    }

    h2 {
      margin: 0;
    }

    canvas {
      background: rgba(0, 229, 255, 0.02);
      border: 2px solid var(--neon-cyan);
      border-radius: 10px;
      box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.12);
      width: 100%;
      max-width: 1060px;
      align-self: center;
    }

    button,
    input,
    select {
      padding: 6px 10px;
      background: rgba(5, 8, 18, 0.8);
      border: 2px solid var(--neon-cyan);
      color: var(--neon-cyan);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
      font-family: 'Fira Code', monospace;
      font-size: 14px;
    }

    button:hover {
      background: var(--neon-cyan);
      color: #031018;
      cursor: pointer;
    }

    select {
      cursor: pointer;
    }

    option {
      background: var(--panel);
      color: var(--neon-cyan);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .form-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .stats {
      color: var(--neon-amber);
      margin-bottom: 5px;
    }

    .math {
      color: var(--neon-lime);
      font-size: 13px;
      white-space: pre-wrap;
    }

    .arrayView {
      color: var(--neon-pink);
      font-size: 15px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .operation-box {
      margin-top: 8px;
      padding: 10px 12px;
      border: 2px solid var(--neon-cyan);
      border-radius: 10px;
      background: rgba(0, 229, 255, 0.08);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
      color: var(--text);
      transition: all 0.25s ease;
    }

    .operation-box.info {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
    }

    .operation-box.success {
      border-color: var(--neon-lime);
      background: rgba(125, 255, 155, 0.12);
      box-shadow: 0 0 16px rgba(125, 255, 155, 0.28);
    }

    .operation-box.error {
      border-color: var(--neon-pink);
      background: rgba(255, 79, 216, 0.1);
      box-shadow: 0 0 16px rgba(255, 79, 216, 0.24);
    }

    @media (max-width: 900px) {
      canvas {
        height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Heap Visualizer (Min / Max)</h2>

    <div class="form-rows">
      <div class="row">
        <div class="input-group">
          <input id="valuesInput" value="10,20,5,6,1,8,9" style="width: 250px;" placeholder="Values (e.g. 10,20,5,6)" />
          <select id="heapType">
            <option value="min">Min-Heap</option>
            <option value="max">Max-Heap</option>
          </select>
          <button onclick="init()">Build Heap</button>
        </div>
      </div>
      <div class="row">
        <div class="controls">
          <button onclick="prevStep()">⏮ Previous</button>
          <button onclick="playFromStart()">▶ Play Build</button>
          <button onclick="nextStep()">Next ⏭</button>
          <button onclick="startExtractRoot()"
            style="border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 10px rgba(255, 79, 216, 0.15);">Extract
            Root</button>
        </div>
      </div>
    </div>

    <canvas id="heapCanvas" width="1060" height="450"></canvas>

    <div class="arrayView" id="arrayView">Array representation: []</div>
    <div class="stats" id="stats"></div>
    <div class="math" id="math"></div>
    <div class="operation-box info" id="message">Visualizer initialized.</div>

  </div>

  <script>
    let heap = [];
    let steps = [];
    let currentStep = 0;
    let interval = null;
    let type = "min";

    const canvas = document.getElementById("heapCanvas");
    const ctx = canvas.getContext("2d");
    const stats = document.getElementById("stats");
    const math = document.getElementById("math");
    const arrayView = document.getElementById("arrayView");

    function cloneHeap(arr) {
      return [...arr];
    }

    function compare(a, b) {
      return type === "min" ? a < b : a > b;
    }

    function heapifyUp(index, isBuilding = true) {
      while (index > 0) {
        let parent = Math.floor((index - 1) / 2);
        if (compare(heap[index], heap[parent])) {
          [heap[index], heap[parent]] = [heap[parent], heap[index]];
          index = parent;
          if (isBuilding) steps.push(cloneHeap(heap));
        } else break;
      }
    }

    function heapifyDown(index) {
      let size = heap.length;
      while (true) {
        let left = 2 * index + 1;
        let right = 2 * index + 2;
        let target = index;

        if (left < size && compare(heap[left], heap[target]))
          target = left;
        if (right < size && compare(heap[right], heap[target]))
          target = right;

        if (target !== index) {
          [heap[index], heap[target]] = [heap[target], heap[index]];
          index = target;
          steps.push(cloneHeap(heap));
        } else break;
      }
    }

    function insert(value) {
      heap.push(value);
      steps.push(cloneHeap(heap));
      heapifyUp(heap.length - 1);
    }

    function generateSteps(values) {
      heap = [];
      steps = [];
      values.forEach(v => {
        insert(v);
      });
    }

    function extractRoot() {
      if (heap.length === 0) {
        setMessage("Heap is empty.", "error");
        return;
      }

      // Clear previous steps for extraction animation
      steps = [];

      let rootVal = heap[0];
      heap[0] = heap[heap.length - 1];
      heap.pop();

      if (heap.length > 0) {
        steps.push(cloneHeap(heap));
        heapifyDown(0);
      } else {
        steps.push([]);
      }

      currentStep = 0;
      if (steps.length > 0) render(steps[currentStep], currentStep, "Extracting root: " + rootVal);

      clearInterval(interval);
      interval = setInterval(() => {
        if (currentStep < steps.length - 1) {
          currentStep++;
          render(steps[currentStep], currentStep, "Extracting root: " + rootVal + " (Heapifying down)");
        } else {
          clearInterval(interval);
          setMessage("Root extracted properly.", "success");
          victorySound();
        }
      }, 1000);
    }

    function startExtractRoot() {
      if (heap.length === 0) {
        setMessage("Heap is empty!", "error");
        return;
      }
      extractRoot();
    }

    function height(arr) {
      if (!arr || arr.length === 0) return 0;
      return Math.floor(Math.log2(arr.length)) + 1;
    }

    function setMessage(text, type = "info") {
      const messageEl = document.getElementById("message");
      if (messageEl) {
        messageEl.innerText = text;
        messageEl.className = "operation-box " + type;
      }
    }

    function drawHeap(arr) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      function drawNode(index, x, y, levelWidth) {
        if (index >= arr.length) return;

        let left = 2 * index + 1;
        let right = 2 * index + 2;

        if (left < arr.length) {
          let childX = x - levelWidth / 2;
          ctx.beginPath();
          ctx.moveTo(x, y + 20);
          ctx.lineTo(childX, y + 80 - 20);
          ctx.strokeStyle = "rgba(0, 229, 255, 0.4)";
          ctx.lineWidth = 2;
          ctx.stroke();
          drawNode(left, childX, y + 80, levelWidth / 2);
        }
        if (right < arr.length) {
          let childX = x + levelWidth / 2;
          ctx.beginPath();
          ctx.moveTo(x, y + 20);
          ctx.lineTo(childX, y + 80 - 20);
          ctx.strokeStyle = "rgba(0, 229, 255, 0.4)";
          ctx.lineWidth = 2;
          ctx.stroke();
          drawNode(right, childX, y + 80, levelWidth / 2);
        }

        ctx.beginPath();
        ctx.arc(x, y, 20, 0, 2 * Math.PI);

        // Style differently based on role (root vs internal vs leaf)
        if (index === 0) {
          ctx.fillStyle = "rgba(255, 79, 216, 0.15)";
          ctx.strokeStyle = "#ff4fd8";
        } else {
          ctx.fillStyle = "rgba(0, 229, 255, 0.05)";
          ctx.strokeStyle = "#00e5ff";
        }

        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#e9f5ff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "bold 16px 'Fira Code'";
        ctx.fillText(arr[index], x, y);
      }

      if (arr && arr.length > 0) {
        let spread = canvas.width / 2;
        drawNode(0, canvas.width / 2, 40, spread);
      }
    }

    function render(arr, stepIndex, customMsg = "") {
      drawHeap(arr || []);

      if (arr) {
        arrayView.textContent = "Array Representation: [" + (arr.length > 0 ? arr.join(", ") : "") + "]";
        stats.textContent = "Height: " + height(arr) + " | Current Size: " + arr.length;
        math.textContent = "Insertion / Extraction Complexity: O(log n)";

        if (customMsg) {
          setMessage(customMsg, "info");
        } else if (stepIndex !== undefined) {
          setMessage("Showing build step " + (stepIndex + 1) + " of " + steps.length, "info");
        }
      } else {
        arrayView.textContent = "Array Representation: []";
        stats.textContent = "Height: 0 | Current Size: 0";
        math.textContent = "Insertion / Extraction Complexity: O(log n)";
      }
      clickSound();
    }

    function nextStep() {
      clearInterval(interval);
      if (currentStep < steps.length - 1) {
        currentStep++;
        render(steps[currentStep], currentStep);
        if (currentStep === steps.length - 1) victorySound();
      }
    }

    function prevStep() {
      clearInterval(interval);
      if (currentStep > 0) {
        currentStep--;
        render(steps[currentStep], currentStep);
      }
    }

    function playFromStart() {
      clearInterval(interval);
      const valStr = document.getElementById("valuesInput").value;
      let values = valStr.split(",").map(v => parseInt(v.trim())).filter(v => !isNaN(v));
      if (values.length === 0) {
        setMessage("No valid numbers found.", "error");
        return;
      }

      generateSteps(values);
      currentStep = 0;

      if (steps.length > 0) render(steps[currentStep], currentStep);
      interval = setInterval(() => {
        if (currentStep < steps.length - 1) {
          currentStep++;
          render(steps[currentStep], currentStep);
        } else {
          clearInterval(interval);
          setMessage("Build animation completed.", "success");
          victorySound();
        }
      }, 900);
    }

    function init() {
      clearInterval(interval);
      type = document.getElementById("heapType").value;
      const valStr = document.getElementById("valuesInput").value;

      if (!valStr.trim()) {
        setMessage("Please enter comma separated numbers.", "error");
        return;
      }

      let values = valStr.split(",").map(v => parseInt(v.trim())).filter(v => !isNaN(v));
      if (values.length === 0) {
        setMessage("No valid numbers found.", "error");
        return;
      }

      generateSteps(values);
      currentStep = steps.length > 0 ? steps.length - 1 : 0;
      if (steps.length > 0) {
        heap = [...steps[currentStep]]; // Sync actual heap with final step
        render(steps[currentStep], currentStep);
        setMessage(type.toUpperCase() + "-Heap built with " + values.length + " items.", "success");
        victorySound();
      } else {
        render([]);
      }
    }

    function clickSound() {
      const ctxA = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctxA.createOscillator();
      const gain = ctxA.createGain();
      osc.frequency.value = 950;
      gain.gain.value = 0.1;
      osc.connect(gain);
      gain.connect(ctxA.destination);
      osc.start();
      osc.stop(ctxA.currentTime + 0.05);
    }

    function victorySound() {
      const ctxA = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctxA.createOscillator();
      const gain = ctxA.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(400, ctxA.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctxA.currentTime + 0.5);
      gain.gain.setValueAtTime(0.2, ctxA.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctxA.currentTime + 0.6);
      osc.connect(gain);
      gain.connect(ctxA.destination);
      osc.start();
      osc.stop(ctxA.currentTime + 0.6);
    }

    // Initial render
    let initialValues = document.getElementById("valuesInput").value.split(",").map(v => parseInt(v.trim())).filter(v => !isNaN(v));
    if (initialValues.length > 0) {
      type = document.getElementById("heapType").value;
      generateSteps(initialValues);
      currentStep = steps.length > 0 ? steps.length - 1 : 0;
      heap = steps.length > 0 ? [...steps[currentStep]] : [];
      render(steps[currentStep], currentStep);
      setMessage("Heap visualizer initialized.", "info");
    } else {
      render([]);
      setMessage("Heap visualizer initialized.", "info");
    }
  </script>

</body>

</html>
