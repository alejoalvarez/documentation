<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doubly Linked List Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04050d;--text:#e9f5ff;--neon-cyan:#00e5ff;--neon-cyan-soft:rgba(0,229,255,.2);
  --neon-pink:#ff4fd8;--neon-lime:#7dff9b;--neon-amber:#ffb347;
}
body{
  margin:0;background:radial-gradient(circle at 50% 20%,#11152b 0%,var(--bg) 45%,#02030a 100%);
  color:var(--text);font-family:'Fira Code',monospace;display:flex;justify-content:center;align-items:flex-start;padding:0;
}
.container{
  width:calc(100% - 32px);max-width:1200px;margin:16px auto;padding:20px;display:flex;flex-direction:column;gap:16px;
  background:linear-gradient(180deg,rgba(10,13,26,.9),rgba(6,9,20,.95));
  border:1px solid var(--neon-cyan-soft);border-radius:14px;
  box-shadow:0 0 28px rgba(0,229,255,.2),0 0 70px rgba(0,229,255,.08);
}
.form-rows{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.input-group{display:flex;gap:8px;align-items:center}
button,input{
  padding:6px 10px;background:rgba(5,8,18,.8);border:2px solid var(--neon-cyan);color:var(--neon-cyan);
  border-radius:8px;box-shadow:0 0 10px rgba(0,229,255,.15);
}
button:hover{background:var(--neon-cyan);color:#031018}
.list{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:12px}
.node{display:flex;align-items:center;gap:8px}
.box{
  min-width:70px;height:56px;padding:0 10px;border-radius:10px;border:2px solid var(--neon-cyan);
  background:rgba(0,229,255,.05);box-shadow:inset 0 0 12px rgba(0,229,255,.12);
  display:flex;justify-content:center;align-items:center;font-size:18px;
}
.arrow{font-size:22px;color:var(--neon-pink)}
.stats{color:var(--neon-amber)}
.math{color:var(--neon-lime);font-size:13px;white-space:pre-line}
.operation-box{
  margin-top:8px;padding:10px 12px;border:2px solid var(--neon-cyan);border-radius:10px;
  background:rgba(0,229,255,.08);box-shadow:0 0 14px rgba(0,229,255,.2);transition:all .25s ease;
}
.operation-box.info{border-color:var(--neon-cyan)}
.operation-box.success{border-color:var(--neon-lime);background:rgba(125,255,155,.12)}
.operation-box.error{border-color:var(--neon-pink);background:rgba(255,79,216,.1)}
.operation-box.search{border-color:var(--neon-amber);background:rgba(255,179,71,.1)}
</style>
</head>
<body>
<div class="container">
  <h2>Doubly Linked List Visualizer</h2>
  <div class="form-rows">
    <div class="row">
      <div class="input-group">
        <input id="valueInput" placeholder="Value"/>
        <button onclick="insertHead()">Insert Head</button>
        <button onclick="insertTail()">Insert Tail</button>
      </div>
    </div>
    <div class="row">
      <div class="input-group">
        <button onclick="removeValue()">Delete Value</button>
        <button onclick="search()">Search</button>
      </div>
    </div>
  </div>

  <div id="listContainer" class="list"></div>
  <div id="stats" class="stats"></div>
  <div id="math" class="math"></div>
  <div id="message" class="operation-box info"></div>
</div>

<script>
class Node{constructor(value){this.value=value;this.prev=null;this.next=null;}}
let head=null, tail=null, interval=null;

function stopSearch(){if(interval){clearInterval(interval);interval=null;}}
function setMessage(text,type="info"){const m=document.getElementById("message");m.textContent=text;m.className="operation-box "+type;}
function values(){const out=[];let c=head;while(c){out.push(c.value);c=c.next;}return out;}

function render(highlight=null){
  const container=document.getElementById("listContainer");
  container.innerHTML="";
  let curr=head, size=0;
  while(curr){
    size++;
    const node=document.createElement("div"); node.className="node";
    if(curr.prev){const left=document.createElement("div");left.className="arrow";left.textContent="←";node.appendChild(left);}
    const box=document.createElement("div"); box.className="box"; box.textContent=curr.value;
    if(highlight!==null && String(curr.value)===String(highlight)){box.style.background="rgba(0,229,255,.85)";box.style.color="#001018";}
    node.appendChild(box);
    if(curr.next){const right=document.createElement("div");right.className="arrow";right.textContent="→";node.appendChild(right);}
    container.appendChild(node);
    curr=curr.next;
  }
  if(size===0){const empty=document.createElement("div");empty.className="box";empty.style.opacity="0.45";empty.textContent="empty";container.appendChild(empty);}
  document.getElementById("stats").textContent="Head: "+(head?head.value:"null")+" | Tail: "+(tail?tail.value:"null")+" | Size: "+size;
  document.getElementById("math").textContent="Insert Head: O(1) | Insert Tail: O(1)\nDelete by Value: O(n) | Search: O(n)";
}

function insertHead(){
  stopSearch();
  const val=document.getElementById("valueInput").value.trim();
  if(val==="") return setMessage("Enter a value to insert at head.","error");
  const n=new Node(val);
  if(!head){head=tail=n;} else {n.next=head;head.prev=n;head=n;}
  render(); setMessage("Inserted '"+val+"' at head.","success"); victorySound();
}

function insertTail(){
  stopSearch();
  const val=document.getElementById("valueInput").value.trim();
  if(val==="") return setMessage("Enter a value to insert at tail.","error");
  const n=new Node(val);
  if(!tail){head=tail=n;} else {tail.next=n;n.prev=tail;tail=n;}
  render(); setMessage("Inserted '"+val+"' at tail.","success"); victorySound();
}

function removeValue(){
  stopSearch();
  const val=document.getElementById("valueInput").value.trim();
  if(val==="") return setMessage("Enter a value to delete.","error");
  if(!head) return setMessage("List is empty.","error");
  let curr=head;
  while(curr && String(curr.value)!==val){curr=curr.next;}
  if(!curr){setMessage("Value '"+val+"' not found.","error"); clickSound(); return;}
  if(curr.prev) curr.prev.next=curr.next; else head=curr.next;
  if(curr.next) curr.next.prev=curr.prev; else tail=curr.prev;
  render(); setMessage("Deleted '"+val+"'.","success"); victorySound();
}

function search(){
  stopSearch();
  const val=document.getElementById("valueInput").value.trim();
  if(val==="") return setMessage("Enter a value to search.","error");
  if(!head) return setMessage("List is empty.","error");
  const arr=values(); let i=0; setMessage("Searching for '"+val+"'...","search");
  interval=setInterval(()=>{
    if(i<arr.length){
      render(arr[i]);
      if(String(arr[i])===val){clearInterval(interval);interval=null;setMessage("Found value '"+val+"' at step "+(i+1)+".","success");victorySound();clickSound();return;}
      i++;
    }else{
      clearInterval(interval);interval=null;render();setMessage("Value '"+val+"' not found.","error");clickSound();
    }
  },600);
}

function clickSound(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),gain=ctx.createGain();
  osc.frequency.value=900; gain.gain.value=.1; osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+.05);
}
function victorySound(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),gain=ctx.createGain();
  osc.type="triangle"; osc.frequency.setValueAtTime(400,ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200,ctx.currentTime+.5);
  gain.gain.setValueAtTime(.2,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.6);
  osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+.6);
}
render(); setMessage("Doubly linked list initialized.","info");
</script>
</body>
</html>
