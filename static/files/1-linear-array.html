<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Array Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #04050d;
  --panel: #0a0d1a;
  --text: #e9f5ff;
  --neon-cyan: #00e5ff;
  --neon-cyan-soft: rgba(0, 229, 255, 0.2);
  --neon-pink: #ff4fd8;
  --neon-lime: #7dff9b;
  --neon-amber: #ffb347;
}
body{
  margin:0;
  background:radial-gradient(circle at 50% 20%, #11152b 0%, var(--bg) 45%, #02030a 100%);
  color:var(--text);
  font-family:'Fira Code',monospace;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:unset;
  padding:0;
}
.container{
  width:calc(100% - 32px);
  max-width:1200px;
  min-height:unset;
  height:auto;
  background:linear-gradient(180deg, rgba(10,13,26,0.9), rgba(6,9,20,0.95));
  border:1px solid var(--neon-cyan-soft);
  border-radius:14px;
  box-shadow:0 0 28px rgba(0,229,255,0.2), 0 0 70px rgba(0,229,255,0.08);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  gap:16px;
  margin:16px auto;
}
.array{
  display:flex;
  gap:5px;
  justify-content:center;
  margin-top:12px;
  flex-wrap:wrap;
}
.cell{
  width:60px;
  height:60px;
  border:2px solid var(--neon-cyan);
  background:rgba(0, 229, 255, 0.05);
  box-shadow:inset 0 0 12px rgba(0,229,255,0.12);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
}
.index{
  text-align:center;
  color:var(--neon-pink);
  font-size:12px;
}
button,input{
  padding:6px 10px;
  background:rgba(5,8,18,0.8);
  border:2px solid var(--neon-cyan);
  color:var(--neon-cyan);
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,229,255,0.15);
}
button:hover{
  background:var(--neon-cyan);
  color:#031018;
}
.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}
.form-rows{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.row{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
.input-group{
  display:flex;
  gap:8px;
  align-items:center;
}
.stats{ color:var(--neon-amber); }
.math{ color:var(--neon-lime); font-size:13px; }
.operation-box{
  margin-top: 8px;
  padding: 10px 12px;
  border: 2px solid var(--neon-cyan);
  border-radius: 10px;
  background: rgba(0, 229, 255, 0.08);
  box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
  color: var(--text);
  transition: all 0.25s ease;
}
.operation-box.info{
  border-color: var(--neon-cyan);
  box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
}
.operation-box.success{
  border-color: var(--neon-lime);
  background: rgba(125, 255, 155, 0.12);
  box-shadow: 0 0 16px rgba(125, 255, 155, 0.28);
}
.operation-box.error{
  border-color: var(--neon-pink);
  background: rgba(255, 79, 216, 0.1);
  box-shadow: 0 0 16px rgba(255, 79, 216, 0.24);
}
.operation-box.search{
  border-color: var(--neon-amber);
  background: rgba(255, 179, 71, 0.1);
  box-shadow: 0 0 16px rgba(255, 179, 71, 0.24);
}
@media (max-width: 900px){
  .cell{
    width:52px;
    height:52px;
    font-size:16px;
  }
}
</style>
</head>
<body>

<div class="container">

<h2>Static Array Visualizer</h2>

<div class="form-rows">
  <div class="row">
    <div class="input-group">
      <input id="sizeInput" type="number" min="1" max="30" value="8" placeholder="Array size"/>
      <button onclick="setSize()">Apply size</button>
    </div>
  </div>
  <div class="row">
    <div class="input-group">
      <input id="valueInput" placeholder="Valor"/>
      <button onclick="search()">Search</button>
    </div>
    <div class="input-group">
      <input id="indexInput" type="number" min="0" placeholder="Index"/>
      <button onclick="insert()">Insert</button>
      <button onclick="remove()">Delete</button>
    </div>
  </div>
</div>

<div id="arrayContainer" class="array"></div>
<div id="indexContainer" class="array"></div>

<div class="stats" id="stats"></div>
<div class="math" id="math"></div>
<div class="operation-box info" id="message"></div>

</div>

<script>
let array=[];
let size=8;
let steps=[];
let currentStep=0;
let interval=null;

function stopSearch(){
  if(interval){
    clearInterval(interval);
    interval=null;
  }
}

function init(){
  const rawSize=parseInt(document.getElementById("sizeInput").value,10);
  size=Number.isNaN(rawSize) ? 8 : Math.min(30, Math.max(1, rawSize));
  document.getElementById("sizeInput").value=size;
  array=new Array(size).fill(null);
  render(array);
  setMessage("Array initialized.","info");
}

function clone(arr){ return [...arr]; }

function setMessage(text,type="info"){
  const messageEl=document.getElementById("message");
  messageEl.innerText=text;
  messageEl.className="operation-box "+type;
}

function render(arr,highlight=-1){
  const container=document.getElementById("arrayContainer");
  const indexContainer=document.getElementById("indexContainer");
  container.innerHTML="";
  indexContainer.innerHTML="";

  arr.forEach((v,i)=>{
    let cell=document.createElement("div");
    cell.className="cell";
    if(i===highlight){
      cell.style.background="rgba(0, 229, 255, 0.85)";
      cell.style.color="#001018";
    }
    cell.innerText=v!==null?v:"";
    container.appendChild(cell);

    let idx=document.createElement("div");
    idx.className="index";
    idx.style.width="60px";
    idx.innerText=i;
    indexContainer.appendChild(idx);
  });

  document.getElementById("stats").innerText="Fixed size: "+size;
  document.getElementById("math").innerText="Access: O(1) -> It's instantaneous thanks to the index.";
  document.getElementById("math").innerText+="\nSearch:O(n) -> In the worst case, you must check each item.";
  document.getElementById("math").innerText+="\nInsertion: O(1) -> If you insert at the beginning, you must “push” all the others to the right.";
  document.getElementById("math").innerText+="\nDeletion:O(n) -> If you remove one, you must “move” the spaces to close the gap.";
}

function setSize(){
  stopSearch();
  const rawSize=parseInt(document.getElementById("sizeInput").value,10);
  if(Number.isNaN(rawSize) || rawSize<1 || rawSize>30){
    setMessage("Invalid size. Use a number between 1 and 30.","error");
    return;
  }
  size=rawSize;
  array=new Array(size).fill(null);
  document.getElementById("indexInput").value="";
  render(array);
  setMessage("Size updated to "+size+".","success");
  clickSound();
}

function insert(){
  stopSearch();
  let val=document.getElementById("valueInput").value.trim();
  let idx=parseInt(document.getElementById("indexInput").value,10);
  if(val===""){
    setMessage("Enter a value to insert.","error");
    return;
  }
  if(Number.isNaN(idx) || idx>=size || idx<0){
    setMessage("Invalid index.","error");
    return;
  }
  array[idx]=val;
  render(array);
  setMessage("Insertado '"+val+"' en índice "+idx+".","success");
  victorySound();
}

function remove(){
  stopSearch();
  let idx=parseInt(document.getElementById("indexInput").value,10);
  if(Number.isNaN(idx) || idx>=size || idx<0){
    setMessage("Invalid index.","error");
    return;
  }
  if(array[idx]===null){
    setMessage("Index "+idx+" is already empty.","error");
    clickSound();
    return;
  }
  array[idx]=null;
  render(array);
  setMessage("Index "+idx+" deleted.","success");
  victorySound();
}

function search(){
  stopSearch();
  let val=document.getElementById("valueInput").value.trim();
  if(val===""){
    setMessage("Enter a value to search.","error");
    return;
  }
  setMessage("Searching for '"+val+"'...","search");
  const target=val.toLowerCase();
  let i=0;
  interval=setInterval(()=>{
    if(i<array.length){
      render(array,i);
      if(array[i]!==null && String(array[i]).toLowerCase()===target){
        clearInterval(interval);
        interval=null;
        setMessage("Found at index "+i+".","success");
        victorySound();
        clickSound();
        return;
      }
      i++;
    } else {
      clearInterval(interval);
      interval=null;
      render(array,-1);
      setMessage("Not found.","error");
      clickSound();
    }
  },600);
}

function clickSound(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.frequency.value=900;
  gain.gain.value=0.1;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.05);
}

function victorySound(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type="triangle";
  osc.frequency.setValueAtTime(400,ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200,ctx.currentTime+0.5);
  gain.gain.setValueAtTime(0.2,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.6);
}

init();
</script>
</body>
</html>
