<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Queue Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04050d;--text:#e9f5ff;--neon-cyan:#00e5ff;--neon-cyan-soft:rgba(0,229,255,.2);
  --neon-pink:#ff4fd8;--neon-lime:#7dff9b;--neon-amber:#ffb347;
}
body{
  margin:0;background:radial-gradient(circle at 50% 20%,#11152b 0%,var(--bg) 45%,#02030a 100%);
  color:var(--text);font-family:'Fira Code',monospace;display:flex;justify-content:center;align-items:flex-start;padding:0;
}
.container{
  width:calc(100% - 32px);max-width:1200px;min-height:unset;height:auto;margin:16px auto;padding:20px;
  display:flex;flex-direction:column;justify-content:flex-start;gap:16px;background:linear-gradient(180deg,rgba(10,13,26,.9),rgba(6,9,20,.95));
  border:1px solid var(--neon-cyan-soft);border-radius:14px;box-shadow:0 0 28px rgba(0,229,255,.2),0 0 70px rgba(0,229,255,.08);
}
.form-rows{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.input-group{display:flex;gap:8px;align-items:center}
button,input{
  padding:6px 10px;background:rgba(5,8,18,.8);border:2px solid var(--neon-cyan);color:var(--neon-cyan);
  border-radius:8px;box-shadow:0 0 10px rgba(0,229,255,.15);
}
button:hover{background:var(--neon-cyan);color:#031018}
.queue{
  display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:12px;min-height:92px;
}
.box{
  min-width:72px;height:56px;padding:0 8px;border-radius:10px;border:2px solid var(--neon-cyan);
  background:rgba(0,229,255,.05);box-shadow:inset 0 0 12px rgba(0,229,255,.12);
  display:flex;justify-content:center;align-items:center;font-size:18px;transition:all .2s ease;
}
.front{background:rgba(0,229,255,.85);color:#001018}
.rear{border-color:var(--neon-pink);box-shadow:0 0 10px rgba(255,79,216,.25), inset 0 0 8px rgba(255,79,216,.15)}
.stats{color:var(--neon-amber)}
.math{color:var(--neon-lime);font-size:13px;white-space:pre-line}
.operation-box{
  margin-top:8px;padding:10px 12px;border:2px solid var(--neon-cyan);border-radius:10px;
  background:rgba(0,229,255,.08);box-shadow:0 0 14px rgba(0,229,255,.2);transition:all .25s ease;
}
.operation-box.info{border-color:var(--neon-cyan)}
.operation-box.success{border-color:var(--neon-lime);background:rgba(125,255,155,.12)}
.operation-box.error{border-color:var(--neon-pink);background:rgba(255,79,216,.1)}
.operation-box.search{border-color:var(--neon-amber);background:rgba(255,179,71,.1)}
</style>
</head>
<body>
<div class="container">
  <h2>Queue Visualizer (FIFO)</h2>

  <div class="form-rows">
    <div class="row">
      <div class="input-group">
        <input id="valueInput" placeholder="Value">
        <button onclick="enqueue()">Enqueue</button>
        <button onclick="dequeue()">Dequeue</button>
      </div>
    </div>
    <div class="row">
      <div class="input-group">
        <button onclick="peekFront()">Peek Front</button>
        <button onclick="runDemo()">Run Demo</button>
        <button onclick="clearQueue()">Clear</button>
      </div>
    </div>
  </div>

  <div id="queueContainer" class="queue"></div>
  <div id="stats" class="stats"></div>
  <div id="math" class="math"></div>
  <div id="message" class="operation-box info"></div>
</div>

<script>
let queue = [];
let operations = 0;
let interval = null;

function stopDemo() {
  if (interval) {
    clearInterval(interval);
    interval = null;
  }
}

function setMessage(text, type = "info") {
  const m = document.getElementById("message");
  m.textContent = text;
  m.className = "operation-box " + type;
}

function render(highlightFront = false) {
  const container = document.getElementById("queueContainer");
  container.innerHTML = "";

  queue.forEach((val, i) => {
    const box = document.createElement("div");
    box.className = "box";
    if (i === 0 && highlightFront) box.classList.add("front");
    if (i === queue.length - 1) box.classList.add("rear");
    box.textContent = val;
    container.appendChild(box);
  });

  if (queue.length === 0) {
    const empty = document.createElement("div");
    empty.className = "box";
    empty.style.opacity = "0.45";
    empty.textContent = "empty";
    container.appendChild(empty);
  }

  document.getElementById("stats").textContent = "Size: " + queue.length + " | Operations: " + operations;
  document.getElementById("math").textContent = "Enqueue: O(1) | Dequeue: O(n) with array.shift()\nQueue model: FIFO (First In, First Out)";
}

function enqueue() {
  stopDemo();
  const val = document.getElementById("valueInput").value.trim();
  if (val === "") return setMessage("Enter a value to enqueue.", "error");
  queue.push(val);
  operations++;
  render(true);
  setMessage("Enqueued '" + val + "'.", "success");
  victorySound();
}

function dequeue() {
  stopDemo();
  if (queue.length === 0) {
    setMessage("Queue is empty.", "error");
    clickSound();
    return;
  }
  const removed = queue.shift();
  operations++;
  render(true);
  setMessage("Dequeued '" + removed + "'.", "success");
  victorySound();
}

function peekFront() {
  stopDemo();
  if (queue.length === 0) return setMessage("Queue is empty.", "error");
  operations++;
  render(true);
  setMessage("Front value is '" + queue[0] + "'.", "search");
  clickSound();
}

function clearQueue() {
  stopDemo();
  queue = [];
  operations = 0;
  render();
  setMessage("Queue cleared.", "info");
}

function runDemo() {
  stopDemo();
  queue = [];
  operations = 0;
  render();
  setMessage("Running demo: enqueue 1,2,3,4.", "search");
  const values = ["1", "2", "3", "4"];
  let i = 0;
  interval = setInterval(() => {
    if (i < values.length) {
      queue.push(values[i]);
      operations++;
      render(true);
      i++;
    } else {
      clearInterval(interval);
      interval = null;
      setMessage("Demo finished. Front is '" + queue[0] + "'.", "success");
      victorySound();
    }
  }, 600);
}

function clickSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value = 900;
  gain.gain.value = 0.1;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.05);
}

function victorySound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(400, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1400, ctx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.2, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.6);
}

render();
setMessage("Queue initialized.", "info");
</script>
</body>
</html>
