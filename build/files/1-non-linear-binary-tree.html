<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binary Tree Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04050d;--text:#e9f5ff;--neon-cyan:#00e5ff;--neon-cyan-soft:rgba(0,229,255,.2);
  --neon-pink:#ff4fd8;--neon-lime:#7dff9b;--neon-amber:#ffb347;
}
body{
  margin:0;background:radial-gradient(circle at 50% 20%,#11152b 0%,var(--bg) 45%,#02030a 100%);
  color:var(--text);font-family:'Fira Code',monospace;display:flex;justify-content:center;align-items:flex-start;padding:0;
}
.container{
  width:calc(100% - 32px);max-width:1200px;min-height:unset;height:auto;margin:16px auto;padding:20px;
  display:flex;flex-direction:column;justify-content:flex-start;gap:16px;background:linear-gradient(180deg,rgba(10,13,26,.9),rgba(6,9,20,.95));
  border:1px solid var(--neon-cyan-soft);border-radius:14px;box-shadow:0 0 28px rgba(0,229,255,.2),0 0 70px rgba(0,229,255,.08);
}
.form-rows{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.input-group{display:flex;gap:8px;align-items:center}
button,input{
  padding:6px 10px;background:rgba(5,8,18,.8);border:2px solid var(--neon-cyan);color:var(--neon-cyan);
  border-radius:8px;box-shadow:0 0 10px rgba(0,229,255,.15);
}
button:hover{background:var(--neon-cyan);color:#031018}
canvas{
  width:100%;height:420px;background:rgba(0,229,255,.04);border:1px solid var(--neon-cyan);
  border-radius:12px;box-shadow:inset 0 0 12px rgba(0,229,255,.1);
}
.stats{color:var(--neon-amber)}
.math{color:var(--neon-lime);font-size:13px;white-space:pre-line}
.operation-box{
  margin-top:8px;padding:10px 12px;border:2px solid var(--neon-cyan);border-radius:10px;
  background:rgba(0,229,255,.08);box-shadow:0 0 14px rgba(0,229,255,.2);transition:all .25s ease;
}
.operation-box.info{border-color:var(--neon-cyan)}
.operation-box.success{border-color:var(--neon-lime);background:rgba(125,255,155,.12)}
.operation-box.error{border-color:var(--neon-pink);background:rgba(255,79,216,.1)}
.operation-box.search{border-color:var(--neon-amber);background:rgba(255,179,71,.1)}
.hidden{visibility:hidden}
</style>
</head>
<body>
<div class="container">
  <h2>Binary Tree Visualizer</h2>

  <div class="form-rows">
    <div class="row">
      <div class="input-group">
        <input id="valuesInput" value="8,3,10,1,6,14,4,7,13" />
        <button onclick="init()">Build Tree</button>
      </div>
    </div>
    <div class="row">
      <div class="input-group">
        <button id="prevBtn" onclick="prevStep()">Prev</button>
        <button onclick="playFromStart()">Play</button>
        <button id="nextBtn" onclick="nextStep()">Next</button>
      </div>
    </div>
  </div>

  <canvas id="treeCanvas" width="1100" height="420"></canvas>
  <div id="stats" class="stats"></div>
  <div id="math" class="math"></div>
  <div id="message" class="operation-box info"></div>
</div>

<script>
class Node{constructor(value){this.value=value;this.left=null;this.right=null;}}
let steps=[], currentStep=0, interval=null, root=null;
const canvas=document.getElementById("treeCanvas");
const ctx=canvas.getContext("2d");
const stats=document.getElementById("stats");
const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");

function stopPlay(){if(interval){clearInterval(interval);interval=null;}}
function setMessage(text,type="info"){const m=document.getElementById("message");m.textContent=text;m.className="operation-box "+type;}

function clickSound(){const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.frequency.value=850;g.gain.value=.1;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.05);}
function victorySound(){const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.type="triangle";o.frequency.setValueAtTime(400,c.currentTime);o.frequency.exponentialRampToValueAtTime(1200,c.currentTime+.4);g.gain.setValueAtTime(.15,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.5);}

function insertNode(node,value,trace=[]){
  if(!node){trace.push({action:"insert",value});return new Node(value);}
  trace.push({action:"visit",value:node.value});
  if(value<node.value) node.left=insertNode(node.left,value,trace);
  else node.right=insertNode(node.right,value,trace);
  return node;
}

function generateSteps(values){
  root=null;const out=[];
  values.forEach(v=>{
    if(Number.isNaN(v)) return;
    const trace=[];root=insertNode(root,v,trace);
    trace.forEach(t=>out.push({tree:JSON.parse(JSON.stringify(root)),highlight:t}));
  });
  return out;
}

function drawTree(node,x,y,offset,highlight){
  if(!node) return;
  ctx.beginPath();ctx.arc(x,y,20,0,2*Math.PI);
  ctx.fillStyle=(highlight&&highlight.value===node.value)?"rgba(0,229,255,.9)":"rgba(255,79,216,.9)";
  ctx.fill();ctx.strokeStyle="#00e5ff";ctx.stroke();
  ctx.fillStyle="#031018";ctx.font="14px Fira Code";ctx.fillText(node.value,x-6,y+5);
  if(node.left){ctx.beginPath();ctx.moveTo(x,y+20);ctx.lineTo(x-offset,y+60);ctx.strokeStyle="rgba(0,229,255,.7)";ctx.stroke();drawTree(node.left,x-offset,y+80,offset/1.7,highlight);}
  if(node.right){ctx.beginPath();ctx.moveTo(x,y+20);ctx.lineTo(x+offset,y+60);ctx.strokeStyle="rgba(0,229,255,.7)";ctx.stroke();drawTree(node.right,x+offset,y+80,offset/1.7,highlight);}
}

function render(step){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(step && step.tree) drawTree(step.tree,canvas.width/2,45,220,step.highlight);
  stats.textContent="Step "+(steps.length?currentStep+1:0)+" of "+steps.length;
  document.getElementById("math").textContent="Average insert/search: O(log n) | Worst case: O(n)\nThis visual shows insertion order in a Binary Search Tree.";
  if(step?.highlight?.action==="insert") setMessage("Inserted node "+step.highlight.value+".","success");
  else if(step?.highlight?.action==="visit") setMessage("Visiting node "+step.highlight.value+" while traversing.","search");
  else setMessage("Tree ready.","info");
  updateButtons(); clickSound();
  if(currentStep===steps.length-1 && steps.length>0) victorySound();
}

function updateButtons(){
  prevBtn.classList.toggle("hidden",currentStep===0||steps.length===0);
  nextBtn.classList.toggle("hidden",currentStep>=steps.length-1||steps.length===0);
}

function nextStep(){if(currentStep<steps.length-1){currentStep++;render(steps[currentStep]);}}
function prevStep(){if(currentStep>0){currentStep--;render(steps[currentStep]);}}

function playFromStart(){
  if(steps.length===0) return setMessage("Build a tree first.","error");
  stopPlay();currentStep=0;render(steps[currentStep]);
  interval=setInterval(()=>{if(currentStep<steps.length-1) nextStep();else stopPlay();},900);
}

function init(){
  stopPlay();
  const raw=document.getElementById("valuesInput").value.trim();
  if(raw===""){steps=[];currentStep=0;render();return setMessage("Enter comma-separated values.","error");}
  const values=raw.split(",").map(v=>Number(v.trim())).filter(v=>!Number.isNaN(v));
  if(values.length===0){steps=[];currentStep=0;render();return setMessage("No valid numbers found.","error");}
  steps=generateSteps(values);currentStep=0;render(steps[0]);
}

document.getElementById("valuesInput").addEventListener("change",init);
init();
</script>
</body>
</html>
