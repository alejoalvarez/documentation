<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AVL Tree Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#04050d;--text:#e9f5ff;--neon-cyan:#00e5ff;--neon-cyan-soft:rgba(0,229,255,.2);--neon-pink:#ff4fd8;--neon-lime:#7dff9b;--neon-amber:#ffb347;}
body{margin:0;background:radial-gradient(circle at 50% 20%,#11152b 0%,var(--bg) 45%,#02030a 100%);color:var(--text);font-family:'Fira Code',monospace;display:flex;justify-content:center;align-items:flex-start;padding:0;}
.container{width:calc(100% - 32px);max-width:1200px;min-height:unset;height:auto;margin:16px auto;padding:20px;display:flex;flex-direction:column;gap:16px;background:linear-gradient(180deg,rgba(10,13,26,.9),rgba(6,9,20,.95));border:1px solid var(--neon-cyan-soft);border-radius:14px;box-shadow:0 0 28px rgba(0,229,255,.2),0 0 70px rgba(0,229,255,.08);}
.form-rows{display:flex;flex-direction:column;gap:12px}.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.input-group{display:flex;gap:8px;align-items:center}
button,input{padding:6px 10px;background:rgba(5,8,18,.8);border:2px solid var(--neon-cyan);color:var(--neon-cyan);border-radius:8px;box-shadow:0 0 10px rgba(0,229,255,.15)}button:hover{background:var(--neon-cyan);color:#031018}
canvas{width:100%;height:420px;background:rgba(0,229,255,.04);border:1px solid var(--neon-cyan);border-radius:12px;box-shadow:inset 0 0 12px rgba(0,229,255,.1)}
.stats{color:var(--neon-amber)}.math{color:var(--neon-lime);font-size:13px;white-space:pre-line}
.operation-box{margin-top:8px;padding:10px 12px;border:2px solid var(--neon-cyan);border-radius:10px;background:rgba(0,229,255,.08);box-shadow:0 0 14px rgba(0,229,255,.2);transition:all .25s ease}
.operation-box.info{border-color:var(--neon-cyan)}.operation-box.success{border-color:var(--neon-lime);background:rgba(125,255,155,.12)}.operation-box.error{border-color:var(--neon-pink);background:rgba(255,79,216,.1)}.operation-box.search{border-color:var(--neon-amber);background:rgba(255,179,71,.1)}
.hidden{visibility:hidden}
</style>
</head>
<body>
<div class="container">
  <h2>AVL Tree + Traversals Visualizer</h2>
  <div class="form-rows">
    <div class="row"><div class="input-group"><input id="valuesInput" value="10,20,30,40,50,25"><button onclick="init()">Build AVL</button></div></div>
    <div class="row"><div class="input-group"><button id="prevBtn" onclick="prevStep()">Prev</button><button onclick="playFromStart()">Play</button><button id="nextBtn" onclick="nextStep()">Next</button><button onclick="startTraversal('in')">InOrder</button><button onclick="startTraversal('pre')">PreOrder</button><button onclick="startTraversal('post')">PostOrder</button></div></div>
  </div>
  <canvas id="treeCanvas" width="1100" height="420"></canvas>
  <div id="stats" class="stats"></div>
  <div id="math" class="math"></div>
  <div id="message" class="operation-box info"></div>
</div>
<script>
class Node{constructor(value){this.value=value;this.left=null;this.right=null;this.height=1;}}
let root=null,steps=[],currentStep=0,interval=null;
const canvas=document.getElementById("treeCanvas"),ctx=canvas.getContext("2d"),stats=document.getElementById("stats"),math=document.getElementById("math"),prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn");
const h=n=>n?n.height:0, upd=n=>n.height=1+Math.max(h(n.left),h(n.right)), bf=n=>h(n.left)-h(n.right);
function stopPlay(){if(interval){clearInterval(interval);interval=null;}}
function setMessage(t,type="info"){const m=document.getElementById("message");m.textContent=t;m.className="operation-box "+type;}
function clickSound(){const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.frequency.value=900;g.gain.value=.1;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.05);}
function victorySound(){const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.type="triangle";o.frequency.setValueAtTime(400,c.currentTime);o.frequency.exponentialRampToValueAtTime(1200,c.currentTime+.5);g.gain.setValueAtTime(.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.6);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.6);}
function rotR(y){const x=y.left,T2=x.right;x.right=y;y.left=T2;upd(y);upd(x);return x;}
function rotL(x){const y=x.right,T2=y.left;y.left=x;x.right=T2;upd(x);upd(y);return y;}
function insert(node,v){if(!node)return new Node(v);if(v<node.value)node.left=insert(node.left,v);else node.right=insert(node.right,v);upd(node);const b=bf(node);if(b>1&&v<node.left.value)return rotR(node);if(b<-1&&v>node.right.value)return rotL(node);if(b>1&&v>node.left.value){node.left=rotL(node.left);return rotR(node);}if(b<-1&&v<node.right.value){node.right=rotR(node.right);return rotL(node);}return node;}
function generateSteps(values){root=null;const out=[];values.forEach(v=>{root=insert(root,v);out.push(JSON.parse(JSON.stringify(root)));});return out;}
function drawTree(node,x,y,off,highlight){if(!node)return;const r=22,isH=highlight===node.value;if(node.left){ctx.beginPath();ctx.moveTo(x,y+r-2);ctx.lineTo(x-off,y+80-r+2);ctx.strokeStyle="rgba(0,229,255,.55)";ctx.lineWidth=2;ctx.stroke();drawTree(node.left,x-off,y+80,off/1.7,highlight);}if(node.right){ctx.beginPath();ctx.moveTo(x,y+r-2);ctx.lineTo(x+off,y+80-r+2);ctx.strokeStyle="rgba(0,229,255,.55)";ctx.lineWidth=2;ctx.stroke();drawTree(node.right,x+off,y+80,off/1.7,highlight);}ctx.save();ctx.shadowBlur=isH?18:12;ctx.shadowColor=isH?"rgba(0,229,255,.65)":"rgba(255,79,216,.45)";ctx.beginPath();ctx.arc(x,y,r,0,2*Math.PI);ctx.fillStyle=isH?"rgba(0,229,255,.92)":"rgba(255,79,216,.88)";ctx.fill();ctx.lineWidth=2;ctx.strokeStyle=isH?"#7dff9b":"#00e5ff";ctx.stroke();ctx.restore();ctx.fillStyle="#031018";ctx.font="700 13px Fira Code";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(String(node.value),x,y+1);}
function render(step,highlight=null){ctx.clearRect(0,0,canvas.width,canvas.height);const tree=step||root;if(tree)drawTree(tree,canvas.width/2,45,220,highlight);stats.textContent="Tree height: "+h(tree)+" | Step "+(steps.length?currentStep+1:0)+"/"+steps.length;math.textContent="AVL insertion: O(log n)\nSelf-balancing through rotations keeps tree height small.";updateButtons();clickSound();}
function updateButtons(){prevBtn.classList.toggle("hidden",currentStep===0||steps.length===0);nextBtn.classList.toggle("hidden",currentStep>=steps.length-1||steps.length===0);}
function nextStep(){if(currentStep<steps.length-1){currentStep++;render(steps[currentStep]);if(currentStep===steps.length-1){setMessage("AVL build complete.","success");victorySound();}}}
function prevStep(){if(currentStep>0){currentStep--;render(steps[currentStep]);}}
function playFromStart(){if(steps.length===0)return setMessage("Build AVL first.","error");stopPlay();currentStep=0;render(steps[currentStep]);setMessage("Playing AVL build steps...","search");interval=setInterval(()=>{if(currentStep<steps.length-1)nextStep();else stopPlay();},900);}
function trav(node,type,list=[]){if(!node)return list;if(type==="pre")list.push(node.value);trav(node.left,type,list);if(type==="in")list.push(node.value);trav(node.right,type,list);if(type==="post")list.push(node.value);return list;}
function startTraversal(type){stopPlay();const order=trav(root,type,[]);if(order.length===0)return setMessage("Tree is empty.","error");let i=0;setMessage(type.toUpperCase()+" traversal running...","search");interval=setInterval(()=>{if(i<order.length){render(root,order[i]);i++;}else{stopPlay();setMessage(type.toUpperCase()+" traversal: "+order.join(", "),"success");victorySound();}},700);}
function init(){stopPlay();const values=document.getElementById("valuesInput").value.split(",").map(v=>parseInt(v.trim(),10)).filter(v=>!Number.isNaN(v));if(values.length===0){root=null;steps=[];currentStep=0;render(null);return setMessage("Enter valid comma-separated numbers.","error");}steps=generateSteps(values);currentStep=0;render(steps[0]);setMessage("AVL built from input values.","info");}
document.getElementById("valuesInput").addEventListener("change",init);init();
</script>
</body>
</html>
