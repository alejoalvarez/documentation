<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>B-Tree Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04050d;
      --panel: #0a0d1a;
      --text: #e9f5ff;
      --neon-cyan: #00e5ff;
      --neon-cyan-soft: rgba(0, 229, 255, 0.2);
      --neon-pink: #ff4fd8;
      --neon-lime: #7dff9b;
      --neon-amber: #ffb347;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at 50% 20%, #11152b 0%, var(--bg) 45%, #02030a 100%);
      color: var(--text);
      font-family: 'Fira Code', monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: unset;
      padding: 0;
    }

    .container {
      width: calc(100% - 32px);
      max-width: 1200px;
      min-height: unset;
      height: auto;
      background: linear-gradient(180deg, rgba(10, 13, 26, 0.9), rgba(6, 9, 20, 0.95));
      border: 1px solid var(--neon-cyan-soft);
      border-radius: 14px;
      box-shadow: 0 0 28px rgba(0, 229, 255, 0.2), 0 0 70px rgba(0, 229, 255, 0.08);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 16px;
      margin: 16px auto;
    }

    h2 {
      margin: 0;
    }

    canvas {
      background: rgba(0, 229, 255, 0.02);
      border: 2px solid var(--neon-cyan);
      border-radius: 10px;
      box-shadow: inset 0 0 12px rgba(0, 229, 255, 0.12);
      width: 100%;
      max-width: 1060px;
      align-self: center;
    }

    button,
    input {
      padding: 6px 10px;
      background: rgba(5, 8, 18, 0.8);
      border: 2px solid var(--neon-cyan);
      color: var(--neon-cyan);
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
      font-family: 'Fira Code', monospace;
      font-size: 14px;
    }

    button:hover {
      background: var(--neon-cyan);
      color: #031018;
      cursor: pointer;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .form-rows {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .stats {
      color: var(--neon-amber);
    }

    .math {
      color: var(--neon-lime);
      font-size: 13px;
      white-space: pre-wrap;
    }

    .operation-box {
      margin-top: 8px;
      padding: 10px 12px;
      border: 2px solid var(--neon-cyan);
      border-radius: 10px;
      background: rgba(0, 229, 255, 0.08);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
      color: var(--text);
      transition: all 0.25s ease;
    }

    .operation-box.info {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.2);
    }

    .operation-box.success {
      border-color: var(--neon-lime);
      background: rgba(125, 255, 155, 0.12);
      box-shadow: 0 0 16px rgba(125, 255, 155, 0.28);
    }

    .operation-box.error {
      border-color: var(--neon-pink);
      background: rgba(255, 79, 216, 0.1);
      box-shadow: 0 0 16px rgba(255, 79, 216, 0.24);
    }

    @media (max-width: 900px) {
      canvas {
        height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>B-Tree Visualizer</h2>

    <div class="form-rows">
      <div class="row">
        <div class="input-group">
          <input id="valuesInput" value="10,20,5,6,12,30,7,17" style="width: 250px;"
            placeholder="Values (e.g. 10,20,5,6)" />
          <input id="degreeInput" type="number" min="2" max="10" value="2" style="width: 80px;"
            title="Tree degree (minimum degree t)" placeholder="Degree" />
          <button onclick="init()">Build Tree</button>
        </div>
      </div>
      <div class="row">
        <div class="controls">
          <button onclick="prevStep()">⏮ Previous</button>
          <button onclick="playFromStart()">▶ Play</button>
          <button onclick="nextStep()">Next ⏭</button>
        </div>
      </div>
    </div>

    <canvas id="treeCanvas" width="1060" height="500"></canvas>

    <div class="stats" id="stats"></div>
    <div class="math" id="math"></div>
    <div class="operation-box info" id="message">Visualizer initialized.</div>

  </div>

  <script>
    class BTreeNode {
      constructor(t, leaf = true) {
        this.t = t;
        this.leaf = leaf;
        this.keys = [];
        this.children = [];
      }
    }

    let root = null;
    let steps = [];
    let currentStep = 0;
    let interval = null;
    let degree = 2;

    const canvas = document.getElementById("treeCanvas");
    const ctx = canvas.getContext("2d");
    const stats = document.getElementById("stats");
    const math = document.getElementById("math");

    function cloneNode(node) {
      if (!node) return null;
      let newNode = new BTreeNode(node.t, node.leaf);
      newNode.keys = [...node.keys];
      newNode.children = node.children.map(c => cloneNode(c));
      return newNode;
    }

    function splitChild(parent, i) {
      let t = parent.t;
      let y = parent.children[i];
      let z = new BTreeNode(t, y.leaf);

      z.keys = y.keys.splice(t);
      let mid = y.keys.pop();

      if (!y.leaf) {
        z.children = y.children.splice(t);
      }

      parent.children.splice(i + 1, 0, z);
      parent.keys.splice(i, 0, mid);
    }

    function insertNonFull(node, key) {
      let i = node.keys.length - 1;

      if (node.leaf) {
        node.keys.push(key);
        node.keys.sort((a, b) => a - b);
      } else {
        while (i >= 0 && key < node.keys[i]) i--;
        i++;

        if (node.children[i].keys.length === 2 * node.t - 1) {
          splitChild(node, i);
          if (key > node.keys[i]) i++;
        }
        insertNonFull(node.children[i], key);
      }
    }

    function insert(key) {
      if (!root) {
        root = new BTreeNode(degree, true);
        root.keys = [key];
        return;
      }

      if (root.keys.length === 2 * degree - 1) {
        let s = new BTreeNode(degree, false);
        s.children[0] = root;
        splitChild(s, 0);
        root = s;
      }

      insertNonFull(root, key);
    }

    function generateSteps(values) {
      root = null;
      steps = [];
      let tempSteps = [];
      values.forEach(v => {
        insert(v);
        tempSteps.push(cloneNode(root));
      });
      return tempSteps;
    }

    function height(node) {
      if (!node) return 0;
      if (node.leaf) return 1;
      return 1 + height(node.children[0]);
    }

    function setMessage(text, type = "info") {
      const messageEl = document.getElementById("message");
      if (messageEl) {
        messageEl.innerText = text;
        messageEl.className = "operation-box " + type;
      }
    }

    function drawNode(node, x, y, levelWidth) {
      if (!node) return;

      const charWidth = 26;
      const padding = 10;
      let boxWidth = node.keys.length * charWidth + padding;

      if (!node.leaf) {
        let numChildren = node.children.length;
        let startX = x - levelWidth / 2;
        let childAlloc = levelWidth / numChildren;

        node.children.forEach((child, i) => {
          let childX = startX + childAlloc / 2 + i * childAlloc;
          ctx.beginPath();
          // Draw line from bottom of current node to top of child node
          ctx.moveTo(x, y + 30);
          ctx.lineTo(childX, y + 90);
          ctx.strokeStyle = "rgba(0, 229, 255, 0.4)";
          ctx.lineWidth = 2;
          ctx.stroke();
          drawNode(child, childX, y + 90, childAlloc * 0.9);
        });
      }

      // Draw node background and border
      ctx.fillStyle = "rgba(0, 229, 255, 0.05)";
      ctx.strokeStyle = "#00e5ff";
      ctx.lineWidth = 2;

      // Custom rounded rect
      ctx.beginPath();
      ctx.roundRect(x - boxWidth / 2, y, boxWidth, 30, 6);
      ctx.fill();
      ctx.stroke();

      // Draw dividers and keys
      ctx.fillStyle = "#ff4fd8"; // Neon pink for keys
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      node.keys.forEach((k, i) => {
        // Vertical divider line between keys
        if (i > 0) {
          ctx.beginPath();
          ctx.moveTo(x - boxWidth / 2 + padding / 2 + i * charWidth, y);
          ctx.lineTo(x - boxWidth / 2 + padding / 2 + i * charWidth, y + 30);
          ctx.strokeStyle = "rgba(0, 229, 255, 0.3)";
          ctx.lineWidth = 1;
          ctx.stroke();
        }
        ctx.fillText(k, x - boxWidth / 2 + padding / 2 + (i + 0.5) * charWidth, y + 15);
      });
    }

    function render(step, stepIndex) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = "bold 15px 'Fira Code'";
      if (step) {
        // Initial max width to spread children
        let spread = canvas.width * 0.95;
        drawNode(step, canvas.width / 2, 40, spread);

        stats.textContent = "Current Height: " + height(step) + " | Degree (t): " + degree;
        math.textContent = "Search complexity: O(log n)\nMax keys per node: " + (2 * degree - 1);

        if (stepIndex !== undefined) {
          setMessage("Showing step " + (stepIndex + 1) + " of " + steps.length, "info");
        }
      } else {
        stats.textContent = "Current Height: 0 | Degree (t): " + degree;
        math.textContent = "Search complexity: O(log n)\nMax keys per node: " + (2 * degree - 1);
      }
      clickSound();
    }

    function clickSound() {
      const ctxA = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctxA.createOscillator();
      const gain = ctxA.createGain();
      osc.frequency.value = 900;
      gain.gain.value = 0.1;
      osc.connect(gain);
      gain.connect(ctxA.destination);
      osc.start();
      osc.stop(ctxA.currentTime + 0.05);
    }

    function victorySound() {
      const ctxA = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctxA.createOscillator();
      const gain = ctxA.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(400, ctxA.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctxA.currentTime + 0.5);
      gain.gain.setValueAtTime(0.2, ctxA.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctxA.currentTime + 0.6);
      osc.connect(gain);
      gain.connect(ctxA.destination);
      osc.start();
      osc.stop(ctxA.currentTime + 0.6);
    }

    function nextStep() {
      clearInterval(interval);
      if (currentStep < steps.length - 1) {
        currentStep++;
        render(steps[currentStep], currentStep);
        if (currentStep === steps.length - 1) victorySound();
      }
    }

    function prevStep() {
      clearInterval(interval);
      if (currentStep > 0) {
        currentStep--;
        render(steps[currentStep], currentStep);
      }
    }

    function playFromStart() {
      clearInterval(interval);
      currentStep = 0;
      if (steps.length > 0) render(steps[currentStep], currentStep);
      interval = setInterval(() => {
        if (currentStep < steps.length - 1) {
          currentStep++;
          render(steps[currentStep], currentStep);
        } else {
          clearInterval(interval);
          setMessage("Animation completed.", "success");
          victorySound();
        }
      }, 1000);
    }

    function init() {
      clearInterval(interval);
      const rawDegree = parseInt(document.getElementById("degreeInput").value);
      if (isNaN(rawDegree) || rawDegree < 2) {
        setMessage("Please enter a valid degree (≥ 2).", "error");
        return;
      }
      degree = rawDegree;

      const valStr = document.getElementById("valuesInput").value;
      if (!valStr.trim()) {
        setMessage("Please enter comma separated values.", "error");
        return;
      }
      let values = valStr.split(",").map(v => parseInt(v.trim())).filter(v => !isNaN(v));
      if (values.length === 0) {
        setMessage("No valid numbers found.", "error");
        return;
      }
      steps = generateSteps(values);
      currentStep = steps.length > 0 ? steps.length - 1 : 0;
      if (steps.length > 0) {
        render(steps[currentStep], currentStep);
        setMessage("B-Tree built with degree " + degree + " and " + values.length + " items.", "success");
        victorySound();
      }
    }

    // Initial render
    let initialValues = document.getElementById("valuesInput").value.split(",").map(v => parseInt(v.trim())).filter(v => !isNaN(v));
    if (initialValues.length > 0) {
      degree = parseInt(document.getElementById("degreeInput").value) || 2;
      steps = generateSteps(initialValues);
      currentStep = steps.length > 0 ? steps.length - 1 : 0;
      render(steps[currentStep], currentStep);
      setMessage("B-Tree visualizer initialized.", "info");
    }
  </script>

</body>

</html>
